<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💕 디데이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Nanum+Pen+Script&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Gowun Dodum', sans-serif;
      background: linear-gradient(135deg, #ffe0ec 0%, #f3e0ff 50%, #ffe9d6 100%);
      min-height: 100vh;
    }
    .font-cute { font-family: 'Nanum Pen Script', cursive; }

    /* Floating heart/star decorations */
    @keyframes floatUp {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0; }
      10%  { opacity: 0.7; }
      90%  { opacity: 0.7; }
      100% { transform: translateY(-110vh) rotate(360deg); opacity: 0; }
    }
    .floatie {
      position: fixed;
      bottom: -40px;
      font-size: 1.6rem;
      pointer-events: none;
      animation: floatUp linear infinite;
      z-index: 0;
    }
    @keyframes pop {
      0% { transform: scale(0.85); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
    .pop-in { animation: pop 0.35s ease-out; }

    @keyframes wiggle {
      0%,100% { transform: rotate(-4deg); }
      50% { transform: rotate(4deg); }
    }
    .wiggle:hover { animation: wiggle 0.5s ease-in-out; }

    /* Custom date input styling */
    input[type="date"]::-webkit-calendar-picker-indicator {
      cursor: pointer;
      filter: hue-rotate(300deg);
    }
    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-thumb { background: #f9b8d0; border-radius: 10px; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ variant = 'primary', size = 'md', className = '', children, ...props }) {
      const variants = {
        primary: 'bg-gradient-to-r from-pink-400 to-purple-400 text-white hover:from-pink-500 hover:to-purple-500 shadow-pink-200',
        secondary: 'bg-white text-pink-500 border-2 border-pink-200 hover:bg-pink-50',
        danger: 'bg-rose-100 text-rose-500 hover:bg-rose-200',
        ghost: 'bg-transparent text-purple-400 hover:bg-purple-50',
      };
      const sizes = {
        sm: 'px-3 py-1.5 text-sm',
        md: 'px-5 py-2.5 text-base',
        lg: 'px-7 py-3 text-lg',
      };
      return (
        <button
          className={`rounded-full font-semibold shadow-md transition-all duration-200 active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
          {...props}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = '', icon, ...props }) {
      return (
        <label className="block w-full">
          {label && (
            <span className="block mb-1.5 ml-1 text-sm font-semibold text-purple-400">
              {icon} {label}
            </span>
          )}
          <input
            className={`w-full px-4 py-2.5 rounded-2xl bg-white/80 border-2 border-pink-100 text-gray-600 placeholder-pink-300 focus:outline-none focus:border-pink-300 focus:ring-2 focus:ring-pink-200 transition ${error ? 'border-rose-300' : ''} ${className}`}
            {...props}
          />
          {error && <span className="block mt-1 ml-1 text-xs text-rose-400">{error}</span>}
        </label>
      );
    }

    function Card({ className = '', children, ...props }) {
      return (
        <div
          className={`bg-white/70 backdrop-blur-sm rounded-3xl shadow-lg shadow-pink-100/60 p-5 ${className}`}
          {...props}
        >
          {children}
        </div>
      );
    }

    // ========================================
    // 🛠️ Helpers
    // ========================================

    const STORAGE_KEY = 'cute-dday-entries';

    // Returns whole-day difference between target date and today (target - today)
    function diffInDays(targetDateStr) {
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = new Date(targetDateStr + 'T00:00:00');
      target.setHours(0, 0, 0, 0);
      return Math.round((target - today) / (1000 * 60 * 60 * 24));
    }

    // Format the big D-label
    function ddayLabel(diff) {
      if (diff === 0) return 'D-Day!';
      if (diff > 0) return `D-${diff}`;
      return `D+${Math.abs(diff)}`;
    }

    // Friendly Korean status sentence
    function statusText(diff) {
      if (diff === 0) return '오늘이에요! 축하해요 🎉';
      if (diff > 0) return `${diff}일 남았어요 ✨`;
      return `${Math.abs(diff)}일 지났어요 💭`;
    }

    function prettyDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      const days = ['일', '월', '화', '수', '목', '금', '토'];
      return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 (${days[d.getDay()]})`;
    }

    const EMOJIS = ['🌸', '💖', '⭐', '🎀', '🍑', '🌷', '🐰', '☁️', '🍓', '🦄'];

    // ========================================
    // 🧩 Decorations
    // ========================================

    function FloatingDecor() {
      const items = useMemo(() => {
        const symbols = ['💗', '⭐', '🌸', '✨', '🎀', '🍑'];
        return Array.from({ length: 12 }, (_, i) => ({
          id: i,
          left: Math.random() * 100,
          duration: 12 + Math.random() * 12,
          delay: Math.random() * 12,
          symbol: symbols[i % symbols.length],
          size: 0.9 + Math.random() * 1.2,
        }));
      }, []);
      return (
        <>
          {items.map((it) => (
            <span
              key={it.id}
              className="floatie"
              style={{
                left: `${it.left}%`,
                animationDuration: `${it.duration}s`,
                animationDelay: `${it.delay}s`,
                fontSize: `${it.size}rem`,
              }}
            >
              {it.symbol}
            </span>
          ))}
        </>
      );
    }

    // ========================================
    // 📄 DDayCard
    // ========================================

    function DDayCard({ entry, onRemove }) {
      const diff = diffInDays(entry.date);
      const isToday = diff === 0;
      const isFuture = diff > 0;

      const accent = isToday
        ? 'from-yellow-300 to-pink-300'
        : isFuture
        ? 'from-pink-300 to-purple-300'
        : 'from-purple-200 to-blue-200';

      return (
        <Card className="pop-in relative overflow-hidden group hover:-translate-y-1 hover:shadow-xl hover:shadow-pink-200/70 transition-all duration-300">
          {/* soft corner blob */}
          <div className={`absolute -top-8 -right-8 w-24 h-24 rounded-full bg-gradient-to-br ${accent} opacity-30 blur-xl`} />

          <button
            onClick={() => onRemove(entry.id)}
            aria-label="삭제"
            className="absolute top-3 right-3 w-7 h-7 rounded-full bg-white/80 text-rose-400 hover:bg-rose-100 flex items-center justify-center text-sm shadow opacity-0 group-hover:opacity-100 transition"
          >
            ✕
          </button>

          <div className="flex items-center gap-4 relative z-10">
            <div className="text-4xl wiggle select-none">{entry.emoji}</div>
            <div className="flex-1 min-w-0">
              <h3 className="text-xl font-bold text-purple-500 truncate">{entry.title}</h3>
              <p className="text-sm text-pink-400">{prettyDate(entry.date)}</p>
            </div>
          </div>

          <div className="mt-4 text-center relative z-10">
            <span className={`font-cute text-6xl leading-none bg-gradient-to-r ${accent} bg-clip-text text-transparent drop-shadow-sm`}>
              {ddayLabel(diff)}
            </span>
            <p className="mt-1 text-sm text-gray-500">{statusText(diff)}</p>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 AddForm
    // ========================================

    function AddForm({ onAdd }) {
      const [title, setTitle] = useState('');
      const [date, setDate] = useState('');
      const [emoji, setEmoji] = useState(EMOJIS[0]);
      const [error, setError] = useState('');

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!title.trim()) { setError('제목을 입력해 주세요 🥺'); return; }
        if (!date) { setError('날짜를 골라 주세요 🗓️'); return; }
        onAdd({ id: Date.now(), title: title.trim(), date, emoji });
        setTitle('');
        setDate('');
        setEmoji(EMOJIS[0]);
        setError('');
      };

      return (
        <Card className="mb-6">
          <h2 className="text-lg font-bold text-purple-500 mb-3 flex items-center gap-1">
            <span>💝</span> 새로운 디데이 추가하기
          </h2>
          <form onSubmit={handleSubmit} className="space-y-3">
            <div className="grid sm:grid-cols-2 gap-3">
              <Input
                label="제목"
                icon="🏷️"
                placeholder="예) 졸업식, 생일, 기념일"
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                maxLength={20}
                error={error && !title.trim() ? error : ''}
              />
              <Input
                label="날짜"
                icon="🗓️"
                type="date"
                value={date}
                onChange={(e) => setDate(e.target.value)}
                error={error && !date ? error : ''}
              />
            </div>

            <div>
              <span className="block mb-1.5 ml-1 text-sm font-semibold text-purple-400">😊 이모지 고르기</span>
              <div className="flex flex-wrap gap-2">
                {EMOJIS.map((e) => (
                  <button
                    type="button"
                    key={e}
                    onClick={() => setEmoji(e)}
                    className={`w-10 h-10 rounded-2xl text-xl flex items-center justify-center transition-all ${
                      emoji === e
                        ? 'bg-gradient-to-br from-pink-200 to-purple-200 scale-110 shadow-md ring-2 ring-pink-300'
                        : 'bg-white/70 hover:bg-pink-50'
                    }`}
                  >
                    {e}
                  </button>
                ))}
              </div>
            </div>

            {error && <p className="text-sm text-rose-400 ml-1">{error}</p>}

            <Button type="submit" size="lg" className="w-full">
              ➕ 추가하기
            </Button>
          </form>
        </Card>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================

    function App() {
      const [entries, setEntries] = useState(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          return saved ? JSON.parse(saved) : [];
        } catch {
          return [];
        }
      });

      useEffect(() => {
        try {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
        } catch {}
      }, [entries]);

      const addEntry = useCallback((entry) => {
        setEntries((prev) => [...prev, entry]);
      }, []);

      const removeEntry = useCallback((id) => {
        setEntries((prev) => prev.filter((e) => e.id !== id));
      }, []);

      // Sort: closest upcoming first, then past
      const sorted = useMemo(() => {
        return [...entries].sort((a, b) => {
          const da = diffInDays(a.date);
          const db = diffInDays(b.date);
          const fa = da >= 0 ? 0 : 1;
          const fb = db >= 0 ? 0 : 1;
          if (fa !== fb) return fa - fb;
          if (fa === 0) return da - db;
          return db - da;
        });
      }, [entries]);

      return (
        <div className="relative min-h-screen px-4 py-8 sm:py-12">
          <FloatingDecor />

          <div className="relative z-10 max-w-2xl mx-auto">
            {/* Header */}
            <header className="text-center mb-8">
              <h1 className="font-cute text-6xl sm:text-7xl text-pink-400 drop-shadow-sm">
                💕 디데이 계산기 💕
              </h1>
              <p className="mt-1 text-purple-400 text-lg">
                소중한 날까지 며칠 남았을까요? ✨
              </p>
            </header>

            <AddForm onAdd={addEntry} />

            {/* List */}
            {sorted.length === 0 ? (
              <Card className="text-center py-12">
                <div className="text-6xl mb-3">🌷</div>
                <p className="text-purple-400 text-lg font-semibold">아직 디데이가 없어요!</p>
                <p className="text-pink-300 text-sm mt-1">위에서 소중한 날을 추가해 보세요 💗</p>
              </Card>
            ) : (
              <div className="grid gap-4 sm:grid-cols-2">
                {sorted.map((entry) => (
                  <DDayCard key={entry.id} entry={entry} onRemove={removeEntry} />
                ))}
              </div>
            )}

            <footer className="text-center mt-10 text-pink-300 text-sm">
              made with 💗 &nbsp;·&nbsp; {entries.length}개의 디데이를 기억하고 있어요
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
