    <circle cx="377" cy="272" r="5" fill="#d89030" opacity="0.5"/>
    <circle cx="398" cy="265" r="4" fill="#f0b048" opacity="0.42"/>
    <circle cx="422" cy="274" r="4.5" fill="#c87820" opacity="0.48"/>
    <circle cx="410" cy="290" r="3.5" fill="#e0a030" opacity="0.42"/>
    <circle cx="385" cy="296" r="3.5" fill="#d08828" opacity="0.38"/>
    <circle cx="438" cy="284" r="3" fill="#f0a840" opacity="0.32"/>
    <circle cx="368" cy="290" r="2.5" fill="#c87020" opacity="0.38"/>
