  <circle cx="460" cy="262" r="4" fill="#c0392b" opacity="0.7"/>
  <circle cx="400" cy="250" r="3.5" fill="#e74c3c" opacity="0.65"/>
  <circle cx="375" cy="285" r="3" fill="#c0392b" opacity="0.6"/>
  <circle cx="428" cy="278" r="3.5" fill="#e74c3c" opacity="0.65"/>

  <!-- 접시 테두리 장식 -->
  <ellipse cx="400" cy="310" rx="256" ry="198" fill="none" stroke="white" stroke-width="1.5" opacity="0.25"/>

  <!-- 젓가락 -->
