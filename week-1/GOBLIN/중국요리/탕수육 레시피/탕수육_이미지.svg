  <ellipse cx="685" cy="428" rx="65" ry="46" fill="#f8ead0"/>
  <ellipse cx="685" cy="428" rx="55" ry="37" fill="url(#saucePuddle)" opacity="0.9"/>
  <!-- 소스 접시 광택 -->
  <ellipse cx="673" cy="418" rx="20" ry="11" fill="white" opacity="0.15" transform="rotate(-10 673 418)"/>
  <ellipse cx="685" cy="430" rx="72" ry="52" fill="none" stroke="#d4a85a" stroke-width="2" opacity="0.5"/>
  <!-- 소스 접시 라벨 -->
  <text x="685" y="472" text-anchor="middle" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#8B5E3C" font-weight="500">소스</text>

  <!-- 타이틀 텍스트 (왼쪽 상단) -->
  <rect x="30" y="28" width="260" height="82" rx="12" fill="#2c1a0e" opacity="0.72"/>
  <text x="52" y="60" font-family="'Apple SD Gothic Neo', 'Noto Serif KR', serif" font-size="28" fill="#f9e4c8" font-weight="700" letter-spacing="2">바삭한 탕수육</text>
  <text x="52" y="82" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#e8c090" opacity="0.85">소스를 끼얹어도 바삭함이 살아있는</text>
  <text x="52" y="100" font-family="'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif" font-size="13" fill="#e8c090" opacity="0.85">황금 튀김옷의 비밀</text>

  <!-- 배경 장식 (흩날리는 효과) -->
