  <!-- 나무 테이블 배경 -->
  <rect width="800" height="520" fill="url(#woodGrain)"/>
  <rect width="800" height="520" fill="#7a4f2a" opacity="0.3"/>

  <!-- 테이블 광택 -->
  <ellipse cx="400" cy="260" rx="380" ry="240" fill="white" opacity="0.04"/>

  <!-- 접시 그림자 -->
  <ellipse cx="402" cy="390" rx="265" ry="38" fill="#00000045"/>

  <!-- 접시 (큰 원) -->
  <ellipse cx="400" cy="310" rx="258" ry="200" fill="url(#plateBg)" filter="url(#shadow)"/>
  <!-- 접시 테두리 -->
  <ellipse cx="400" cy="310" rx="258" ry="200" fill="none" stroke="#d4a85a" stroke-width="3" opacity="0.6"/>
  <!-- 접시 내부 오목한 부분 -->
  <ellipse cx="400" cy="308" rx="228" ry="175" fill="#f0d8a8"/>
  <ellipse cx="400" cy="306" rx="210" ry="160" fill="#f8ead0"/>
