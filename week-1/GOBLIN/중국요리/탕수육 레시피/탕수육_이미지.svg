    <circle cx="272" cy="244" r="4" fill="#c87010" opacity="0.5"/>
    <circle cx="290" cy="238" r="3" fill="#e09030" opacity="0.4"/>
    <circle cx="310" cy="248" r="3.5" fill="#b86010" opacity="0.45"/>
