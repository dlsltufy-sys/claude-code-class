  <circle cx="120" cy="440" r="2" fill="#f39c12" opacity="0.25"/>
  <circle cx="55" cy="420" r="2.5" fill="#e74c3c" opacity="0.2"/>
  <circle cx="730" cy="80" r="2.5" fill="#f39c12" opacity="0.3"/>
  <circle cx="760" cy="100" r="2" fill="#e67e22" opacity="0.25"/>
</svg>
