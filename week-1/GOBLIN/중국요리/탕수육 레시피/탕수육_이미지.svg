  <g transform="rotate(28, 645, 300)">
    <rect x="614" y="115" width="7" height="295" rx="3.5" fill="#c8a050"/>
    <rect x="615" y="116" width="5" height="293" rx="2.5" fill="#e8c070" opacity="0.6"/>
    <rect x="615" y="393" width="5" height="17" rx="2.5" fill="#a07030"/>
