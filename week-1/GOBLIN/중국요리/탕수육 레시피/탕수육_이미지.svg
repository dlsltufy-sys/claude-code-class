<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" width="800" height="520">
  <defs>
    <radialGradient id="plateBg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#f5e6c8"/>
      <stop offset="100%" stop-color="#c8a46e"/>
    </radialGradient>
    <radialGradient id="plateShine" cx="38%" cy="30%" r="45%">
      <stop offset="0%" stop-color="white" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="saucePuddle" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#e74c3c"/>
      <stop offset="60%" stop-color="#c0392b"/>
      <stop offset="100%" stop-color="#96281b"/>
    </radialGradient>
    <radialGradient id="meat1" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f0b05a"/>
      <stop offset="50%" stop-color="#d4851e"/>
      <stop offset="100%" stop-color="#a85c00"/>
    </radialGradient>
    <radialGradient id="meat2" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#e8a040"/>
      <stop offset="50%" stop-color="#c87010"/>
      <stop offset="100%" stop-color="#965000"/>
    </radialGradient>
    <radialGradient id="meat3" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#f5b860"/>
      <stop offset="50%" stop-color="#dc9030"/>
      <stop offset="100%" stop-color="#b06800"/>
    </radialGradient>
    <radialGradient id="tableBg" cx="50%" cy="50%" r="70%">
