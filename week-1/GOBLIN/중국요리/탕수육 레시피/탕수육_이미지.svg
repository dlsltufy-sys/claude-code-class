      <path d="M0 20 Q30 18 60 22 Q90 26 120 20" stroke="#6b4020" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M0 40 Q40 36 80 42 Q100 45 120 38" stroke="#6b4020" stroke-width="1" fill="none" opacity="0.3"/>
      <path d="M0 60 Q20 58 50 62 Q80 66 120 60" stroke="#6b4020" stroke-width="1.5" fill="none" opacity="0.4"/>
      <path d="M0 10 Q60 8 120 12" stroke="#8a5c30" stroke-width="0.8" fill="none" opacity="0.25"/>
      <path d="M0 50 Q50 47 120 52" stroke="#8a5c30" stroke-width="0.8" fill="none" opacity="0.25"/>
