    <rect x="590" y="120" width="7" height="290" rx="3.5" fill="#c8a050"/>
    <rect x="591" y="121" width="5" height="288" rx="2.5" fill="#e8c070" opacity="0.6"/>
    <!-- 끝 부분 -->
