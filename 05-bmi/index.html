<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BMI 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-100">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Input({ label, value, onChange, placeholder, unit, ...rest }) {
      return (
        <label className="block">
          <span className="mb-1.5 block text-sm font-medium text-slate-700">{label}</span>
          <div className="relative">
            <input
              type="number"
              inputMode="decimal"
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              className="w-full rounded-xl border border-slate-300 bg-white px-4 py-3 pr-12 text-lg text-slate-900 shadow-sm outline-none transition focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200"
              {...rest}
            />
            {unit && (
              <span className="pointer-events-none absolute inset-y-0 right-4 flex items-center text-sm font-medium text-slate-400">
                {unit}
              </span>
            )}
          </div>
        </label>
      );
    }

    function Button({ children, variant = "primary", className = "", ...rest }) {
      const variants = {
        primary: "bg-indigo-600 text-white hover:bg-indigo-700 active:bg-indigo-800",
        ghost: "bg-slate-100 text-slate-600 hover:bg-slate-200 active:bg-slate-300",
      };
      return (
        <button
          className={`w-full rounded-xl px-4 py-3 text-base font-semibold shadow-sm transition focus:outline-none focus:ring-2 focus:ring-indigo-300 disabled:cursor-not-allowed disabled:opacity-50 ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = "" }) {
      return (
        <div className={`rounded-2xl bg-white p-6 shadow-xl shadow-slate-200/60 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧮 BMI Logic
    // ========================================
    // 카테고리 정의 (대한비만학회 기준 참고)
    const CATEGORIES = [
      { max: 18.5, label: "저체중", color: "blue", text: "text-blue-600", bg: "bg-blue-50", bar: "bg-blue-500", ring: "ring-blue-200" },
      { max: 23, label: "정상", color: "green", text: "text-green-600", bg: "bg-green-50", bar: "bg-green-500", ring: "ring-green-200" },
      { max: 25, label: "과체중", color: "yellow", text: "text-yellow-600", bg: "bg-yellow-50", bar: "bg-yellow-500", ring: "ring-yellow-200" },
      { max: Infinity, label: "비만", color: "red", text: "text-red-600", bg: "bg-red-50", bar: "bg-red-500", ring: "ring-red-200" },
    ];

    function getCategory(bmi) {
      return CATEGORIES.find((c) => bmi < c.max) || CATEGORIES[CATEGORIES.length - 1];
    }

    // ========================================
    // 📄 Result Display
    // ========================================
    function ResultPanel({ bmi }) {
      const category = getCategory(bmi);
      // BMI 10~40 범위를 0~100% 게이지로 매핑
      const percent = Math.min(100, Math.max(0, ((bmi - 10) / 30) * 100));

      return (
        <div className={`mt-6 rounded-2xl border border-slate-100 p-6 text-center ring-1 ${category.bg} ${category.ring}`}>
          <p className="text-sm font-medium text-slate-500">회원님의 BMI 지수는</p>
          <p className={`my-1 text-5xl font-extrabold tabular-nums ${category.text}`}>
            {bmi.toFixed(1)}
          </p>
          <span className={`inline-block rounded-full px-4 py-1 text-sm font-bold text-white ${category.bar}`}>
            {category.label}
          </span>

          {/* 게이지 바 */}
          <div className="mt-6">
            <div className="relative h-3 w-full overflow-hidden rounded-full bg-slate-200">
              <div
                className={`h-full rounded-full transition-all duration-500 ${category.bar}`}
                style={{ width: `${percent}%` }}
              />
            </div>
            <div className="mt-2 flex justify-between text-xs text-slate-400">
              <span>저체중</span>
              <span>정상</span>
              <span>과체중</span>
              <span>비만</span>
            </div>
          </div>
        </div>
      );
    }

    function EmptyState() {
      return (
        <div className="mt-6 rounded-2xl border border-dashed border-slate-200 p-8 text-center">
          <p className="text-sm text-slate-400">
            키와 몸무게를 입력하면<br />BMI 결과가 표시됩니다.
          </p>
        </div>
      );
    }

    // ========================================
    // 🚀 App
    // ========================================
    function App() {
      const [height, setHeight] = useState("");
      const [weight, setWeight] = useState("");

      const bmi = useMemo(() => {
        const h = parseFloat(height);
        const w = parseFloat(weight);
        if (!h || !w || h <= 0 || w <= 0) return null;
        const meters = h / 100;
        return w / (meters * meters);
      }, [height, weight]);

      const reset = () => {
        setHeight("");
        setWeight("");
      };

      return (
        <div className="flex min-h-screen items-center justify-center p-4">
          <div className="w-full max-w-md">
            <header className="mb-6 text-center">
              <h1 className="text-3xl font-extrabold text-slate-800">BMI 계산기</h1>
              <p className="mt-1 text-sm text-slate-500">체질량지수를 간편하게 확인하세요</p>
            </header>

            <Card>
              <div className="space-y-4">
                <Input
                  label="키"
                  value={height}
                  onChange={(e) => setHeight(e.target.value)}
                  placeholder="예: 170"
                  unit="cm"
                  min="0"
                />
                <Input
                  label="몸무게"
                  value={weight}
                  onChange={(e) => setWeight(e.target.value)}
                  placeholder="예: 65"
                  unit="kg"
                  min="0"
                />
              </div>

              <div className="mt-6">
                <Button variant="ghost" onClick={reset} disabled={!height && !weight}>
                  초기화
                </Button>
              </div>

              {bmi !== null ? <ResultPanel bmi={bmi} /> : <EmptyState />}
            </Card>

            <footer className="mt-4 text-center text-xs text-slate-400">
              기준: 저체중 &lt;18.5 · 정상 18.5~22.9 · 과체중 23~24.9 · 비만 ≥25
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
