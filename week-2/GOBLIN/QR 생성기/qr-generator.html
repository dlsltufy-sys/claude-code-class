<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR 코드 생성기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fadeIn { animation: fadeIn 0.3s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [urlInput, setUrlInput] = useState('');
      const [qrDataUrl, setQrDataUrl] = useState(null);
      const [encodedUrl, setEncodedUrl] = useState('');
      const [error, setError] = useState('');

      const generate = () => {
        const value = urlInput.trim();
        if (!value) {
          setError('링크를 입력해 주세요.');
          setQrDataUrl(null);
          return;
        }
        setError('');
        try {
          const qr = qrcode(0, 'L');
          qr.addData(value, 'Byte');
          qr.make();
          const dataUrl = qr.createDataURL(4, 2);
          setQrDataUrl(dataUrl);
          setEncodedUrl(value);
          const link = document.createElement('a');
          link.href = dataUrl;
          link.download = `qrcode-${Date.now()}.png`;
          document.body.appendChild(link);
          link.click();
          document.body.removeChild(link);
        } catch (e) {
          setError('QR 코드를 생성하지 못했습니다. 입력 내용을 확인해 주세요.');
          setQrDataUrl(null);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter') generate();
      };

      const download = () => {
        if (!qrDataUrl) return;
        const link = document.createElement('a');
        link.href = qrDataUrl;
        link.download = `qrcode-${Date.now()}.png`;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
      };

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-blue-50 to-indigo-100 flex items-center justify-center px-4 py-10">
          <div className="w-full max-w-md">

            <div className="text-center mb-6">
              <div className="inline-flex items-center justify-center w-14 h-14 bg-blue-500 rounded-2xl shadow-lg shadow-blue-500/30 mb-3">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" className="text-white">
                  <path d="M3 3h7v7H3zM14 3h7v7h-7zM3 14h7v7H3zM14 14h3v3h-3zM20 14h1M14 20h1M17 17h4v4" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                </svg>
              </div>
              <h1 className="text-2xl font-bold text-gray-800">QR 코드 생성기</h1>
              <p className="text-gray-500 mt-1">링크를 QR 코드로 변환하세요</p>
            </div>

            <div className="bg-white rounded-3xl shadow-xl shadow-slate-200/60 p-6 sm:p-7">
              <div className="space-y-4">
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1.5">QR로 변환할 링크</label>
                  <input
                    type="text"
                    value={urlInput}
                    onChange={(e) => { setUrlInput(e.target.value); setError(''); }}
                    onKeyDown={handleKeyDown}
                    placeholder="https://example.com"
                    className="w-full px-4 py-3 rounded-xl border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-300 focus:border-blue-400 transition-colors"
                  />
                </div>

                <button
                  onClick={generate}
                  className="w-full px-4 py-3 bg-blue-500 text-white font-semibold rounded-xl hover:bg-blue-600 active:bg-blue-700 shadow-md shadow-blue-500/20 transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-blue-400 focus:ring-offset-2"
                >
                  QR 생성
                </button>
              </div>

              {error && (
                <div className="mt-4 flex items-start gap-2 bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 animate-fadeIn">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" className="mt-0.5 flex-shrink-0">
                    <circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="2" />
                    <path d="M12 8v5M12 16h.01" stroke="currentColor" strokeWidth="2" strokeLinecap="round" />
                  </svg>
                  <span>{error}</span>
                </div>
              )}

              {qrDataUrl && (
                <div className="mt-6 pt-6 border-t border-gray-100 animate-fadeIn">
                  <div className="flex flex-col items-center">
                    <div className="bg-white p-4 rounded-2xl border border-gray-100 shadow-sm">
                      <img src={qrDataUrl} alt="QR 코드" className="w-[260px] h-[260px]" />
                    </div>

                    <button
                      onClick={download}
                      className="w-full mt-5 px-4 py-2.5 bg-blue-500 text-white font-semibold rounded-xl hover:bg-blue-600 shadow-md shadow-blue-500/20 transition-all duration-200 inline-flex items-center justify-center gap-2"
                    >
                      <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
                      </svg>
                      PNG 다운로드
                    </button>

                    <div className="w-full mt-4">
                      <p className="text-xs font-medium text-gray-400 mb-1">인코딩된 링크</p>
                      <p className="text-sm text-gray-600 break-all bg-gray-50 rounded-xl px-4 py-3 font-mono">{encodedUrl}</p>
                    </div>
                  </div>
                </div>
              )}
            </div>

            <p className="text-center text-xs text-gray-400 mt-6">
              QR 코드를 스캔하면 링크가 바로 열립니다
            </p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
