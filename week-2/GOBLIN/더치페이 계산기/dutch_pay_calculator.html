<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>더치페이 계산기</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // 초기 사람 데이터 생성 함수
    function createPerson(id, name) {
      return { id, name, items: [] };
    }

    // 초기 메뉴 아이템 생성 함수
    function createItem(id) {
      return { id, name: '', price: '', discount: '' };
    }

    function App() {
      // ── 배열: 참여자 목록 ──
      const [people, setPeople] = useState([
        createPerson(1, '참여자 1'),
        createPerson(2, '참여자 2'),
      ]);
      const [nextPersonId, setNextPersonId] = useState(3);
      const [nextItemId, setNextItemId] = useState(1);

      const [expectedTotal, setExpectedTotal] = useState('');
      const [results, setResults] = useState(null);

      // 사람 추가
      function addPerson() {
        const newPerson = createPerson(nextPersonId, `참여자 ${nextPersonId}`);
        setPeople([...people, newPerson]);
        setNextPersonId(nextPersonId + 1);
      }

      // 사람 삭제
      function removePerson(personId) {
        if (people.length <= 1) return;
        setPeople(people.filter(p => p.id !== personId));
      }

      // 이름 수정
      function updateName(personId, newName) {
        setPeople(people.map(p =>
          p.id === personId ? { ...p, name: newName } : p
        ));
      }

      // 메뉴 추가
      function addItem(personId) {
        const newItem = createItem(nextItemId);
        setNextItemId(nextItemId + 1);
        setPeople(people.map(p =>
          p.id === personId ? { ...p, items: [...p.items, newItem] } : p
        ));
      }

      // 메뉴 삭제
      function removeItem(personId, itemId) {
        setPeople(people.map(p =>
          p.id === personId
            ? { ...p, items: p.items.filter(item => item.id !== itemId) }
            : p
        ));
      }

      // 메뉴 이름/가격 수정
      function updateItem(personId, itemId, field, value) {
        setPeople(people.map(p =>
          p.id === personId
            ? {
                ...p,
                items: p.items.map(item =>
                  item.id === itemId ? { ...item, [field]: value } : item
                ),
              }
            : p
        ));
      }

      // 메뉴 아이템의 할인 적용 금액 계산
      function getItemFinalPrice(item) {
        const price = parseFloat(item.price);
        if (isNaN(price) || price <= 0) return 0;
        const rate = Math.min(100, Math.max(0, parseFloat(item.discount) || 0));
        return price * (1 - rate / 100);
      }

      // 개인별 소계 계산 (반복문 + 메뉴별 할인 적용)
      function getSubtotal(person) {
        let total = 0;
        for (const item of person.items) {   // ← 반복문
          total += getItemFinalPrice(item);
        }
        return total;
      }

      // 전체 합계 계산
      function getTotalAmount() {
        let total = 0;
        people.forEach(p => {               // ← 반복문
          total += getSubtotal(p);
        });
        return total;
      }

      // 계산하기
      function calculate() {
        const totalAmount = getTotalAmount();
        if (totalAmount <= 0) {
          alert('메뉴 금액을 1개 이상 입력해주세요.');
          return;
        }

        // ── 조건 분기: 총액 불일치 시 경고창 ──
        if (expectedTotal !== '') {
          const expected = parseFloat(expectedTotal) || 0;
          const diff = Math.round(totalAmount) - Math.round(expected);
          if (diff !== 0) {
            const sign = diff > 0 ? '+' : '';
            alert(
              `총액이 일치하지 않습니다!\n\n` +
              `영수증 총액:    ${expected.toLocaleString()}원\n` +
              `참여자 합계:  ${Math.round(totalAmount).toLocaleString()}원\n` +
              `차이:              ${sign}${diff.toLocaleString()}원`
            );
            return;
          }
        }

        // ── 개인별 최종 금액 계산 (반복문) ──
        const resultList = people.map(person => {
          const subtotal = getSubtotal(person);
          return {
            id: person.id,
            name: person.name || '이름없음',
            items: person.items.filter(i => i.name || i.price),
            subtotal,
            finalAmount: subtotal,
          };
        });

        setResults({
          list: resultList,
          totalAfterDiscount: totalAmount,
        });
      }

      const totalAmount = getTotalAmount();

      return (
        <div className="max-w-2xl mx-auto p-4 py-8">
          <h1 className="text-3xl font-bold text-center text-purple-700 mb-8">
            💰 더치페이 계산기
          </h1>

          {/* ── 참여자 카드 목록 (배열 렌더링) ── */}
          <div className="space-y-4 mb-6">
            {people.map(person => (   // ← 배열 .map() 반복문
              <div key={person.id} className="bg-white rounded-2xl shadow p-5">
                {/* 참여자 이름 */}
                <div className="flex items-center gap-3 mb-4">
                  <input
                    className="flex-1 text-lg font-semibold border-b-2 border-purple-300 focus:border-purple-600 outline-none px-1 py-1"
                    value={person.name}
                    onChange={e => updateName(person.id, e.target.value)}
                    placeholder="이름 입력"
                  />
                  <button
                    onClick={() => removePerson(person.id)}
                    disabled={people.length <= 1}
                    className="text-red-400 hover:text-red-600 disabled:opacity-30 text-sm font-medium"
                  >
                    삭제
                  </button>
                </div>

                {/* 메뉴 목록 (배열) */}
                <div className="space-y-2 mb-3">
                  {person.items.length === 0 && (
                    <p className="text-gray-400 text-sm text-center py-2">
                      메뉴를 추가하세요
                    </p>
                  )}
                  {person.items.map(item => {  // ← 배열 .map() 반복문
                    const price = parseFloat(item.price) || 0;
                    const rate = Math.min(100, Math.max(0, parseFloat(item.discount) || 0));
                    const discounted = price * (1 - rate / 100);
                    const saved = price - discounted;
                    return (
                      <div key={item.id} className="space-y-1">
                        <div className="flex gap-2 items-center">
                          <input
                            className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400"
                            placeholder="메뉴명 (예: 삼겹살)"
                            value={item.name}
                            onChange={e => updateItem(person.id, item.id, 'name', e.target.value)}
                          />
                          <input
                            className="w-24 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:border-purple-400"
                            placeholder="금액"
                            type="number"
                            min="0"
                            value={item.price}
                            onChange={e => updateItem(person.id, item.id, 'price', e.target.value)}
                          />
                          <span className="text-gray-400 text-sm">원</span>
                          <input
                            className="w-16 border border-green-200 rounded-lg px-2 py-2 text-sm focus:outline-none focus:border-green-400 text-center"
                            placeholder="할인%"
                            type="number"
                            min="0"
                            max="100"
                            value={item.discount}
                            onChange={e => updateItem(person.id, item.id, 'discount', e.target.value)}
                          />
                          <span className="text-gray-400 text-sm">%</span>
                          <button
                            onClick={() => removeItem(person.id, item.id)}
                            className="text-red-300 hover:text-red-500 text-lg leading-none"
                          >
                            ×
                          </button>
                        </div>
                        {/* 조건 분기: 할인이 있을 때만 할인 정보 표시 */}
                        {rate > 0 && price > 0 && (
                          <div className="flex gap-2 pl-2 text-xs text-green-600">
                            <span className="line-through text-gray-400">{price.toLocaleString()}원</span>
                            <span>→</span>
                            <span className="font-semibold">{Math.round(discounted).toLocaleString()}원</span>
                            <span className="text-green-500">(-{Math.round(saved).toLocaleString()}원 절약)</span>
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

                <div className="flex justify-between items-center">
                  <button
                    onClick={() => addItem(person.id)}
                    className="text-purple-600 hover:text-purple-800 text-sm font-medium"
                  >
                    + 메뉴 추가
                  </button>
                  <span className="text-gray-600 text-sm font-semibold">
                    소계: {getSubtotal(person).toLocaleString()}원
                  </span>
                </div>
              </div>
            ))}
          </div>

          {/* 인원 추가 버튼 */}
          <button
            onClick={addPerson}
            className="w-full py-3 border-2 border-dashed border-purple-300 text-purple-500 hover:bg-purple-50 rounded-2xl font-medium mb-6 transition"
          >
            + 참여자 추가
          </button>

          {/* ── 총액 입력 및 검증 ── */}
          <div className="bg-white rounded-2xl shadow p-5 mb-4">
            <h2 className="text-lg font-bold text-gray-700 mb-3">총액 확인</h2>
            <div className="flex items-center gap-3 mb-4">
              <label className="text-sm text-gray-500 whitespace-nowrap">영수증 총액</label>
              <input
                type="number"
                min="0"
                className="flex-1 border border-gray-200 rounded-lg px-3 py-2 focus:outline-none focus:border-purple-400"
                placeholder="영수증에 찍힌 총액 입력"
                value={expectedTotal}
                onChange={e => setExpectedTotal(e.target.value)}
              />
              <span className="text-gray-500 text-sm">원</span>
            </div>

            {/* 합계 표시 */}
            <div className="flex justify-between text-sm text-gray-600">
              <span>참여자 입력 합계</span>
              <span className="font-semibold">{totalAmount.toLocaleString()}원</span>
            </div>
          </div>

          {/* 계산 버튼 */}
          <button
            onClick={calculate}
            className="w-full py-4 bg-gradient-to-r from-purple-600 to-indigo-600 text-white text-lg font-bold rounded-2xl shadow hover:opacity-90 transition mb-8"
          >
            계산하기
          </button>

          {/* ── 결과 표시 ── */}
          {results && (
            <div className="bg-white rounded-2xl shadow p-5">
              <h2 className="text-xl font-bold text-gray-700 mb-4">계산 결과</h2>

              {/* 합계 요약 */}
              <div className="bg-gray-50 rounded-xl p-4 mb-4 text-sm">
                <div className="flex justify-between font-bold text-purple-700 text-base">
                  <span>최종 합계</span>
                  <span>{Math.round(results.totalAfterDiscount).toLocaleString()}원</span>
                </div>
              </div>

              {/* 개인별 결과 (배열 반복) */}
              <div className="space-y-3">
                {results.list.map(r => (   // ← 배열 .map() 반복문
                  <div key={r.id} className="border border-gray-100 rounded-xl p-4">
                    <div className="flex justify-between items-start mb-2">
                      <span className="font-semibold text-gray-700">{r.name}</span>
                      <span className="text-purple-700 font-bold text-lg">
                        {Math.round(r.finalAmount).toLocaleString()}원
                      </span>
                    </div>

                    {/* 메뉴 목록 (할인율 포함) */}
                    {r.items.length > 0 && (
                      <ul className="text-sm text-gray-500 space-y-1 mb-2">
                        {r.items.map((item, idx) => {
                          const price = parseFloat(item.price) || 0;
                          const rate = Math.min(100, Math.max(0, parseFloat(item.discount) || 0));
                          const finalPrice = Math.round(price * (1 - rate / 100));
                          return (
                            <li key={idx} className="flex justify-between items-center">
                              <span>{item.name || '(이름없음)'}</span>
                              <span className="flex items-center gap-1">
                                {/* 조건 분기: 할인 있을 때만 원가/할인율 표시 */}
                                {rate > 0 && (
                                  <>
                                    <span className="line-through text-gray-300 text-xs">{price.toLocaleString()}원</span>
                                    <span className="text-green-500 text-xs">-{rate}%</span>
                                  </>
                                )}
                                <span className="font-medium text-gray-700">{price > 0 ? finalPrice.toLocaleString() + '원' : '-'}</span>
                              </span>
                            </li>
                          );
                        })}
                      </ul>
                    )}

                    <div className="flex justify-between text-sm text-gray-500 border-t border-gray-100 pt-2">
                      <span>소계 {Math.round(r.subtotal).toLocaleString()}원</span>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
