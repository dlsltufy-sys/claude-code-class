<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문서 편집기 - PDF 저장</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
  <style>
    /* A4 비율 캔버스 (210mm x 297mm) */
    .a4-page {
      width: 210mm;
      min-height: 297mm;
      padding: 25mm 20mm;
      box-sizing: border-box;
    }

    /* 편집 영역 기본 타이포그래피 */
    #editor {
      outline: none;
      line-height: 1.7;
      color: #1f2937;
      font-size: 16px;
    }
    #editor:empty:before {
      content: attr(data-placeholder);
      color: #9ca3af;
    }
    #editor h1 { font-size: 2em; font-weight: 700; margin: 0.5em 0; }
    #editor h2 { font-size: 1.5em; font-weight: 700; margin: 0.5em 0; }
    #editor h3 { font-size: 1.25em; font-weight: 600; margin: 0.5em 0; }
    #editor p { margin: 0.4em 0; }
    #editor ul { list-style: disc; padding-left: 1.5em; margin: 0.4em 0; }
    #editor ol { list-style: decimal; padding-left: 1.5em; margin: 0.4em 0; }
    #editor a { color: #2563eb; text-decoration: underline; }

    /* 툴바 버튼 활성 상태 */
    .tool-btn.active {
      background-color: #dbeafe;
      color: #1d4ed8;
    }

    /* 인쇄 시 캔버스 그림자 제거 (PDF 캡처용) */
    @media print {
      body { background: white; }
    }

    /* PDF 업로드 오버레이 */
    #uploadOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #uploadOverlay.show { display: flex; }

    /* 스크롤 영역 가운데 정렬 */
    .canvas-wrap {
      transform-origin: top center;
    }
    @media (max-width: 900px) {
      .canvas-wrap { transform: scale(0.55); }
    }
  </style>
</head>
<body class="bg-gray-200 min-h-screen flex flex-col">

  <!-- ======================================== -->
  <!-- 상단 헤더 -->
  <!-- ======================================== -->
  <header class="bg-white border-b border-gray-200 shadow-sm sticky top-0 z-20">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <div class="flex items-center gap-2">
        <span class="text-2xl">📝</span>
        <h1 class="text-lg font-bold text-gray-800">문서 편집기</h1>
      </div>
      <!-- PDF 업로드 버튼 -->
      <button id="uploadBtn"
        class="inline-flex items-center gap-2 bg-white hover:bg-gray-50 active:bg-gray-100 text-gray-700 font-semibold px-5 py-2 rounded-lg shadow border border-gray-300 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 8l5-5 5 5M12 3v13" />
        </svg>
        <span>PDF 불러오기</span>
      </button>
      <input id="pdfFileInput" type="file" accept="application/pdf" class="hidden" />

      <button id="exportBtn"
        class="inline-flex items-center gap-2 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold px-5 py-2 rounded-lg shadow transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v2a2 2 0 002 2h12a2 2 0 002-2v-2M7 10l5 5 5-5M12 15V3" />
        </svg>
        <span>PDF로 저장</span>
      </button>
    </div>
  </header>

  <!-- ======================================== -->
  <!-- 서식 툴바 -->
  <!-- ======================================== -->
  <div class="bg-white border-b border-gray-200 sticky top-[57px] z-10">
    <div class="max-w-6xl mx-auto px-4 py-2 flex flex-wrap items-center gap-1">

      <!-- 헤딩 / 단락 선택 -->
      <select id="blockSelect" title="단락 형식"
        class="text-sm border border-gray-300 rounded-md px-2 py-1.5 bg-white hover:bg-gray-50 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-300">
        <option value="P">본문</option>
        <option value="H1">제목 1</option>
        <option value="H2">제목 2</option>
        <option value="H3">제목 3</option>
      </select>

      <!-- 글자 크기 -->
      <select id="fontSizeSelect" title="글자 크기"
        class="text-sm border border-gray-300 rounded-md px-2 py-1.5 bg-white hover:bg-gray-50 cursor-pointer focus:outline-none focus:ring-2 focus:ring-blue-300">
        <option value="2">작게</option>
        <option value="3" selected>보통</option>
        <option value="5">크게</option>
        <option value="6">아주 크게</option>
      </select>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 굵게 / 기울임 / 밑줄 -->
      <button data-cmd="bold" title="굵게" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center font-bold text-gray-700">B</button>
      <button data-cmd="italic" title="기울임" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center italic text-gray-700">I</button>
      <button data-cmd="underline" title="밑줄" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center underline text-gray-700">U</button>
      <button data-cmd="strikeThrough" title="취소선" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center line-through text-gray-700">S</button>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 글자 색상 -->
      <label title="글자 색" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center cursor-pointer relative text-gray-700">
        <span class="font-bold">A</span>
        <input id="foreColor" type="color" value="#1f2937" class="absolute bottom-1 w-6 h-1.5 cursor-pointer opacity-0">
        <span id="foreColorBar" class="absolute bottom-1.5 w-5 h-1 rounded" style="background:#1f2937"></span>
      </label>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 정렬 -->
      <button data-cmd="justifyLeft" title="왼쪽 정렬" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 10h10M4 14h16M4 18h10"/></svg>
      </button>
      <button data-cmd="justifyCenter" title="가운데 정렬" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M7 10h10M4 14h16M7 18h10"/></svg>
      </button>
      <button data-cmd="justifyRight" title="오른쪽 정렬" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M10 10h10M4 14h16M10 18h10"/></svg>
      </button>
      <button data-cmd="justifyFull" title="양쪽 정렬" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M4 6h16M4 10h16M4 14h16M4 18h16"/></svg>
      </button>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 목록 -->
      <button data-cmd="insertUnorderedList" title="글머리 기호 목록" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="12" r="1.2" fill="currentColor" stroke="none"/><circle cx="3.5" cy="18" r="1.2" fill="currentColor" stroke="none"/></svg>
      </button>
      <button data-cmd="insertOrderedList" title="번호 매기기 목록" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" d="M9 6h12M9 12h12M9 18h12M3 5h1.5v3M3 8h2"/><path stroke-linecap="round" d="M3 13.5c0-.6.5-1 1-1s1 .4 1 1c0 .8-2 1.3-2 2.5h2"/></svg>
      </button>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 실행 취소 / 다시 실행 -->
      <button data-cmd="undo" title="실행 취소" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M3 10h11a4 4 0 110 8h-3M3 10l4-4M3 10l4 4"/></svg>
      </button>
      <button data-cmd="redo" title="다시 실행" class="tool-btn w-9 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700">
        <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 10H10a4 4 0 100 8h3M21 10l-4-4M21 10l-4 4"/></svg>
      </button>

      <span class="w-px h-6 bg-gray-300 mx-1"></span>

      <!-- 서식 지우기 -->
      <button data-cmd="removeFormat" title="서식 지우기" class="tool-btn px-3 h-9 rounded-md hover:bg-gray-100 flex items-center justify-center text-gray-700 text-sm">서식 지우기</button>
    </div>
  </div>

  <!-- ======================================== -->
  <!-- 편집 캔버스 영역 -->
  <!-- ======================================== -->
  <main class="flex-1 overflow-auto py-8 flex justify-center">
    <div class="canvas-wrap">
      <!-- PDF로 캡처될 영역 -->
      <div id="paper" class="a4-page bg-white shadow-xl rounded-sm">
        <!-- 문서 제목 -->
        <input id="docTitle" type="text" placeholder="문서 제목을 입력하세요"
          class="w-full text-3xl font-bold text-gray-900 placeholder-gray-300 border-0 border-b-2 border-gray-100 focus:border-blue-300 focus:outline-none pb-3 mb-6 bg-transparent" />

        <!-- 본문 편집 영역 -->
        <div id="editor" contenteditable="true" data-placeholder="여기에 내용을 입력하세요..."></div>
      </div>
    </div>
  </main>

  <!-- ======================================== -->
  <!-- PDF 업로드 오버레이 -->
  <!-- ======================================== -->
  <div id="uploadOverlay">
    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4 overflow-hidden">
      <!-- 로딩 상태 -->
      <div id="overlayLoading" class="p-8 flex flex-col items-center gap-4 hidden">
        <svg class="animate-spin w-10 h-10 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
          <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
          <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"/>
        </svg>
        <p class="text-gray-600 font-medium">PDF 내용을 분석하는 중...</p>
      </div>
      <!-- 확인 상태 -->
      <div id="overlayConfirm" class="hidden">
        <div class="px-6 pt-6 pb-4">
          <div class="flex items-center gap-3 mb-1">
            <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center flex-shrink-0">
              <svg class="w-5 h-5 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M9 12h6m-3-3v6M7 4H5a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2V8l-5-5H7z"/>
              </svg>
            </div>
            <div>
              <h2 class="text-lg font-bold text-gray-900">PDF 불러오기 완료</h2>
              <p id="overlayFileName" class="text-sm text-gray-500 truncate max-w-xs"></p>
            </div>
          </div>
          <p id="overlayPageInfo" class="text-sm text-gray-500 mt-3 mb-4"></p>
          <!-- 미리보기 -->
          <div class="bg-gray-50 rounded-lg border border-gray-200 p-3 mb-4 max-h-36 overflow-y-auto">
            <p class="text-xs text-gray-400 mb-1 font-medium uppercase tracking-wide">내용 미리보기</p>
            <p id="overlayPreview" class="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed"></p>
          </div>
          <p class="text-sm text-gray-600">불러온 내용을 어떻게 적용할까요?</p>
        </div>
        <div class="px-6 pb-6 flex flex-col gap-2">
          <button id="overlayReplace" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors">
            현재 문서 내용 교체
          </button>
          <button id="overlayAppend" class="w-full bg-white hover:bg-gray-50 text-gray-700 font-semibold py-2.5 rounded-lg border border-gray-300 transition-colors">
            현재 내용 뒤에 추가
          </button>
          <button id="overlayCancel" class="w-full text-gray-400 hover:text-gray-600 text-sm py-1.5 transition-colors">
            취소
          </button>
        </div>
      </div>
      <!-- 오류 상태 -->
      <div id="overlayError" class="p-8 flex flex-col items-center gap-4 hidden">
        <div class="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center">
          <svg class="w-6 h-6 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </div>
        <div class="text-center">
          <p class="font-semibold text-gray-800 mb-1">PDF를 읽을 수 없습니다</p>
          <p id="overlayErrorMsg" class="text-sm text-gray-500"></p>
        </div>
        <button id="overlayErrorClose" class="bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium px-6 py-2 rounded-lg transition-colors">
          닫기
        </button>
      </div>
    </div>
  </div>

  <!-- ======================================== -->
  <!-- 스크립트 -->
  <!-- ======================================== -->
  <script>
    (function () {
      const editor = document.getElementById('editor');
      const docTitle = document.getElementById('docTitle');
      const blockSelect = document.getElementById('blockSelect');
      const fontSizeSelect = document.getElementById('fontSizeSelect');
      const foreColor = document.getElementById('foreColor');
      const foreColorBar = document.getElementById('foreColorBar');
      const exportBtn = document.getElementById('exportBtn');

      // execCommand 사용 시 스타일을 inline span 으로 적용
      try { document.execCommand('styleWithCSS', false, true); } catch (e) {}

      // 편집기에 포커스 유지 후 명령 실행
      function exec(cmd, value = null) {
        editor.focus();
        document.execCommand(cmd, false, value);
        updateToolbarState();
      }

      // 단순 명령 버튼 (data-cmd)
      document.querySelectorAll('[data-cmd]').forEach(function (btn) {
        btn.addEventListener('mousedown', function (e) {
          // 선택 영역 유지를 위해 기본 포커스 이동 방지
          e.preventDefault();
        });
        btn.addEventListener('click', function () {
          exec(btn.getAttribute('data-cmd'));
        });
      });

      // 단락 형식 (제목 / 본문)
      blockSelect.addEventListener('change', function () {
        exec('formatBlock', blockSelect.value);
      });

      // 글자 크기
      fontSizeSelect.addEventListener('change', function () {
        exec('fontSize', fontSizeSelect.value);
      });

      // 글자 색상
      foreColor.addEventListener('input', function () {
        foreColorBar.style.background = foreColor.value;
        exec('foreColor', foreColor.value);
      });

      // 툴바 활성 상태 갱신 (굵게/기울임/밑줄/정렬 등)
      const stateCmds = ['bold', 'italic', 'underline', 'strikeThrough',
        'justifyLeft', 'justifyCenter', 'justifyRight', 'justifyFull',
        'insertUnorderedList', 'insertOrderedList'];

      function updateToolbarState() {
        stateCmds.forEach(function (cmd) {
          const btn = document.querySelector('[data-cmd="' + cmd + '"]');
          if (!btn) return;
          let on = false;
          try { on = document.queryCommandState(cmd); } catch (e) {}
          btn.classList.toggle('active', on);
        });

        // 현재 단락 형식 반영
        let block = 'P';
        try {
          const v = document.queryCommandValue('formatBlock');
          if (v) block = v.toUpperCase();
        } catch (e) {}
        if (['H1', 'H2', 'H3', 'P'].includes(block)) {
          blockSelect.value = block;
        }
      }

      editor.addEventListener('keyup', updateToolbarState);
      editor.addEventListener('mouseup', updateToolbarState);
      editor.addEventListener('focus', updateToolbarState);

      // ========================================
      // PDF 내보내기
      // ========================================
      exportBtn.addEventListener('click', function () {
        const titleText = (docTitle.value || '').trim();

        // PDF 캡처용 임시 컨테이너 구성 (제목 + 본문)
        const container = document.createElement('div');
        container.style.padding = '15mm';
        container.style.boxSizing = 'border-box';
        container.style.width = '210mm';
        container.style.background = '#ffffff';
        container.style.color = '#1f2937';
        container.style.fontFamily = "'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif";
        container.style.lineHeight = '1.7';

        if (titleText) {
          const h = document.createElement('h1');
          h.textContent = titleText;
          h.style.fontSize = '28px';
          h.style.fontWeight = '700';
          h.style.marginBottom = '16px';
          h.style.paddingBottom = '12px';
          h.style.borderBottom = '2px solid #e5e7eb';
          h.style.color = '#111827';
          container.appendChild(h);
        }

        const body = editor.cloneNode(true);
        body.removeAttribute('contenteditable');
        body.removeAttribute('id');
        body.style.fontSize = '16px';
        body.style.lineHeight = '1.7';
        container.appendChild(body);

        const fileName = (titleText || '문서') + '.pdf';

        const opt = {
          margin: 0,
          filename: fileName,
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, backgroundColor: '#ffffff' },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
          pagebreak: { mode: ['avoid-all', 'css', 'legacy'] }
        };

        const original = exportBtn.innerHTML;
        exportBtn.disabled = true;
        exportBtn.innerHTML = '<span>저장 중...</span>';

        html2pdf().set(opt).from(container).save().then(function () {
          exportBtn.disabled = false;
          exportBtn.innerHTML = original;
        }).catch(function (err) {
          console.error(err);
          alert('PDF 저장 중 오류가 발생했습니다.');
          exportBtn.disabled = false;
          exportBtn.innerHTML = original;
        });
      });

      // 초기 포커스
      editor.focus();

      // ========================================
      // PDF 업로드 및 텍스트 추출
      // ========================================

      // file:// 환경에서 외부 Worker URL이 차단되는 문제를 해결합니다.
      // importScripts를 담은 Blob URL을 Worker로 사용하면 CORS 없이 동작합니다.
      // (jsdelivr는 Access-Control-Allow-Origin: * 헤더를 반환하므로 importScripts 가능)
      const WORKER_CDN = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js';

      function initPDFWorker() {
        const code = "importScripts('" + WORKER_CDN + "');";
        const blob = new Blob([code], { type: 'text/javascript' });
        pdfjsLib.GlobalWorkerOptions.workerSrc = URL.createObjectURL(blob);
      }
      initPDFWorker();

      const uploadBtn      = document.getElementById('uploadBtn');
      const pdfFileInput   = document.getElementById('pdfFileInput');
      const uploadOverlay  = document.getElementById('uploadOverlay');
      const overlayLoading = document.getElementById('overlayLoading');
      const overlayConfirm = document.getElementById('overlayConfirm');
      const overlayError   = document.getElementById('overlayError');

      let extractedTitle   = '';
      let extractedHTML    = '';

      function showOverlay(state) {
        uploadOverlay.classList.add('show');
        overlayLoading.classList.toggle('hidden', state !== 'loading');
        overlayConfirm.classList.toggle('hidden', state !== 'confirm');
        overlayError.classList.toggle('hidden', state !== 'error');
      }
      function hideOverlay() {
        uploadOverlay.classList.remove('show');
        pdfFileInput.value = '';
      }

      uploadBtn.addEventListener('click', function () { pdfFileInput.click(); });

      pdfFileInput.addEventListener('change', async function () {
        const file = pdfFileInput.files[0];
        if (!file) return;
        showOverlay('loading');

        try {
          if (typeof pdfjsLib === 'undefined') {
            throw new Error('PDF.js 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해 주세요.');
          }
          const arrayBuffer = await file.arrayBuffer();
          const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
          const totalPages = pdf.numPages;

          // 페이지별 텍스트 블록 추출
          const pageBlocks = [];
          for (let p = 1; p <= totalPages; p++) {
            const page    = await pdf.getPage(p);
            const content = await page.getTextContent();

            // y좌표 기준으로 줄 묶기
            const lines = [];
            let currentLine = [];
            let lastY = null;

            content.items.forEach(function (item) {
              if (!item.str) return;
              const y = Math.round(item.transform[5]);
              if (lastY !== null && Math.abs(y - lastY) > 3) {
                if (currentLine.length) {
                  lines.push({ y: lastY, text: currentLine.join(' ').trim() });
                  currentLine = [];
                }
              }
              currentLine.push(item.str);
              lastY = y;
            });
            if (currentLine.length) {
              lines.push({ y: lastY, text: currentLine.join(' ').trim() });
            }

            pageBlocks.push(lines.map(function (l) { return l.text; }).filter(Boolean));
          }

          // 모든 페이지 텍스트를 합쳐 HTML 생성
          const allLines = [];
          pageBlocks.forEach(function (block, idx) {
            block.forEach(function (line) { allLines.push(line); });
            if (idx < pageBlocks.length - 1) allLines.push('--- 페이지 구분 ---');
          });

          if (allLines.length === 0) throw new Error('텍스트를 추출할 수 없는 PDF입니다. (이미지 기반 PDF일 수 있습니다)');

          // 첫 번째 줄을 제목 후보로 사용
          extractedTitle = allLines[0].replace(/^---.*---$/, '').trim();
          const bodyLines = allLines.slice(1);

          // HTML 변환: 구분선은 <hr>, 빈 줄은 단락 구분, 나머지는 <p>
          let html = '';
          bodyLines.forEach(function (line) {
            if (/^---.*---$/.test(line)) {
              html += '<hr style="border:none;border-top:1px solid #e5e7eb;margin:12px 0">';
            } else if (line.trim() === '') {
              html += '<p><br></p>';
            } else {
              html += '<p>' + line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') + '</p>';
            }
          });
          extractedHTML = html;

          // 미리보기 (앞 300자)
          const previewText = bodyLines.slice(0, 10).join('\n');
          document.getElementById('overlayFileName').textContent = file.name;
          document.getElementById('overlayPageInfo').textContent =
            '총 ' + totalPages + '페이지 · ' + allLines.length + '줄 추출됨';
          document.getElementById('overlayPreview').textContent =
            previewText.length > 300 ? previewText.slice(0, 300) + '…' : previewText;

          showOverlay('confirm');
        } catch (err) {
          console.error('[PDF 불러오기 오류]', err);
          document.getElementById('overlayErrorMsg').textContent =
            (err.message || String(err)) + '\n\n(자세한 내용은 브라우저 개발자 도구 콘솔을 확인하세요)';
          showOverlay('error');
        }
      });

      // 교체
      document.getElementById('overlayReplace').addEventListener('click', function () {
        docTitle.value = extractedTitle;
        editor.innerHTML = extractedHTML;
        hideOverlay();
        editor.focus();
      });

      // 추가
      document.getElementById('overlayAppend').addEventListener('click', function () {
        if (!editor.innerHTML.trim()) {
          docTitle.value = extractedTitle;
        }
        editor.innerHTML +=
          '<hr style="border:none;border-top:2px dashed #e5e7eb;margin:16px 0">' + extractedHTML;
        hideOverlay();
        editor.focus();
      });

      document.getElementById('overlayCancel').addEventListener('click', hideOverlay);
      document.getElementById('overlayErrorClose').addEventListener('click', hideOverlay);
      uploadOverlay.addEventListener('click', function (e) {
        if (e.target === uploadOverlay) hideOverlay();
      });

    })();
  </script>
</body>
</html>
