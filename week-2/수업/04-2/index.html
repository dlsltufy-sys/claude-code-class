<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>돼지고기 옥수수 솥밥</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    /* 부드러운 페이드인 애니메이션 (Tailwind 기본 유틸리티로는 표현이 어려움) */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-in-up {
      animation: fadeInUp 0.6s ease-out both;
    }
    /* 스크롤 부드럽게 */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="bg-amber-50">
  <div id="root"></div>
  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useMemo } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    // Badge — 기본 정보 표시용 (조리시간/인분/난이도 등)
    function Badge({ icon, label, value, className = "" }) {
      return (
        <div
          className={`flex flex-col items-center justify-center bg-white rounded-2xl shadow-sm px-4 py-3 border border-amber-100 ${className}`}
        >
          <span className="text-2xl mb-1" aria-hidden="true">{icon}</span>
          <span className="text-xs text-amber-700 font-medium">{label}</span>
          <span className="text-sm font-bold text-amber-900">{value}</span>
        </div>
      );
    }

    // Card — 콘텐츠 섹션 래퍼
    function Card({ title, icon, children, className = "" }) {
      return (
        <section
          className={`bg-white rounded-3xl shadow-md p-5 sm:p-7 border border-amber-100 ${className}`}
        >
          {title && (
            <h2 className="flex items-center gap-2 text-xl sm:text-2xl font-bold text-amber-900 mb-5">
              {icon && <span aria-hidden="true">{icon}</span>}
              {title}
            </h2>
          )}
          {children}
        </section>
      );
    }

    // CheckItem — 재료 체크박스 항목
    function CheckItem({ checked, onToggle, label, amount }) {
      return (
        <li>
          <button
            type="button"
            onClick={onToggle}
            aria-pressed={checked}
            className="w-full flex items-center justify-between gap-3 py-2.5 px-3 rounded-xl hover:bg-amber-50 transition-colors text-left"
          >
            <span className="flex items-center gap-3 min-w-0">
              <span
                className={`flex-shrink-0 w-6 h-6 rounded-md border-2 flex items-center justify-center transition-colors ${
                  checked
                    ? "bg-amber-500 border-amber-500 text-white"
                    : "border-amber-300 bg-white"
                }`}
                aria-hidden="true"
              >
                {checked && (
                  <svg className="w-4 h-4" viewBox="0 0 20 20" fill="currentColor">
                    <path fillRule="evenodd" d="M16.7 5.3a1 1 0 010 1.4l-7.5 7.5a1 1 0 01-1.4 0L3.3 9.7a1 1 0 011.4-1.4l3.1 3.1 6.8-6.8a1 1 0 011.4 0z" clipRule="evenodd" />
                  </svg>
                )}
              </span>
              <span
                className={`truncate ${
                  checked ? "line-through text-amber-400" : "text-amber-900"
                }`}
              >
                {label}
              </span>
            </span>
            <span
              className={`flex-shrink-0 text-sm font-medium ${
                checked ? "text-amber-300" : "text-amber-600"
              }`}
            >
              {amount}
            </span>
          </button>
        </li>
      );
    }

    // StepItem — 조리 순서 단계 (클릭 시 완료/취소선)
    function StepItem({ number, text, done, onToggle }) {
      return (
        <li>
          <button
            type="button"
            onClick={onToggle}
            aria-pressed={done}
            className="w-full flex items-start gap-4 py-3 px-3 rounded-2xl hover:bg-amber-50 transition-colors text-left"
          >
            <span
              className={`flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center font-bold transition-colors ${
                done
                  ? "bg-amber-200 text-amber-500"
                  : "bg-amber-500 text-white shadow"
              }`}
              aria-hidden="true"
            >
              {done ? "✓" : number}
            </span>
            <p
              className={`pt-1 leading-relaxed ${
                done ? "line-through text-amber-400" : "text-amber-900"
              }`}
            >
              {text}
            </p>
          </button>
        </li>
      );
    }

    // ========================================
    // 📄 Page Component — RecipePage
    // ========================================

    // 레시피 데이터
    const INGREDIENTS = [
      { id: "rice", label: "불린 쌀", amount: "2컵 (360ml)" },
      { id: "pork", label: "돼지고기 (목살·앞다리)", amount: "200g" },
      { id: "corn", label: "옥수수 (생옥수수 또는 캔)", amount: "1컵" },
      { id: "water", label: "물 (또는 육수)", amount: "1.8컵" },
      { id: "soy", label: "간장", amount: "1큰술" },
      { id: "mirin", label: "맛술", amount: "1큰술" },
      { id: "sesame-oil", label: "참기름", amount: "1작은술" },
      { id: "garlic", label: "다진 마늘", amount: "1/2큰술" },
      { id: "scallion", label: "대파 (송송)", amount: "약간" },
      { id: "pepper", label: "후추", amount: "약간" },
    ];

    const STEPS = [
      "쌀은 30분 이상 충분히 불린 뒤 체에 밭쳐 물기를 빼주세요.",
      "돼지고기는 한입 크기로 썰어 간장·맛술·다진 마늘·후추로 밑간하여 10분간 재워주세요.",
      "달군 솥(또는 냄비)에 참기름을 두르고 밑간한 돼지고기를 겉면이 익을 정도로 볶아주세요.",
      "볶은 돼지고기 위에 불린 쌀을 고르게 펴 담고 옥수수를 골고루 올려주세요.",
      "물(또는 육수)을 부어준 뒤 센 불에서 끓이다가, 끓어오르면 약불로 줄여 12~15분간 뜸을 들여주세요.",
      "불을 끄고 5분간 추가로 뜸을 들인 후 송송 썬 대파를 올려 골고루 섞어 완성합니다.",
    ];

    const TIPS = [
      "생옥수수를 사용하면 톡톡 터지는 식감과 단맛이 더욱 살아납니다.",
      "물 대신 닭육수나 다시마 육수를 쓰면 감칠맛이 깊어집니다.",
      "누룽지를 좋아한다면 마지막에 1~2분간 센 불로 바닥을 살짝 태워보세요.",
      "기호에 따라 버터 한 조각을 넣어 비비면 고소함이 배가됩니다.",
    ];

    function RecipePage() {
      // 재료 체크 상태 관리
      const [checked, setChecked] = useState({});
      // 완료된 조리 단계 상태 관리
      const [doneSteps, setDoneSteps] = useState({});

      const toggleIngredient = (id) =>
        setChecked((prev) => ({ ...prev, [id]: !prev[id] }));

      const toggleStep = (idx) =>
        setDoneSteps((prev) => ({ ...prev, [idx]: !prev[idx] }));

      // 체크된 재료 개수 계산
      const checkedCount = useMemo(
        () => Object.values(checked).filter(Boolean).length,
        [checked]
      );

      return (
        <div className="min-h-screen pb-16">
          {/* 헤더 / 히어로 영역 */}
          <header className="bg-gradient-to-br from-amber-400 via-orange-400 to-orange-500 text-white">
            <div className="max-w-4xl mx-auto px-5 py-12 sm:py-16 text-center animate-fade-in-up">
              <div className="text-7xl sm:text-8xl mb-4" aria-hidden="true">🍚</div>
              <h1 className="text-3xl sm:text-5xl font-extrabold drop-shadow-sm">
                돼지고기 옥수수 솥밥
              </h1>
              <p className="mt-4 text-base sm:text-lg text-amber-50 max-w-2xl mx-auto leading-relaxed">
                고소하게 볶은 돼지고기와 톡톡 터지는 옥수수가 어우러진,
                한 솥에 끓여내는 든든하고 달큰한 한 그릇 솥밥입니다.
              </p>
            </div>
          </header>

          <main className="max-w-4xl mx-auto px-5 -mt-8 space-y-8">
            {/* 기본 정보 Badge */}
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3 animate-fade-in-up">
              <Badge icon="⏱️" label="조리시간" value="40분" />
              <Badge icon="🍽️" label="분량" value="2인분" />
              <Badge icon="🔥" label="난이도" value="보통" />
              <Badge icon="🥘" label="조리도구" value="솥/냄비" />
            </div>

            {/* 재료 섹션 */}
            <Card title="재료" icon="🧺">
              <div className="flex items-center justify-between mb-3">
                <p className="text-sm text-amber-600">
                  항목을 눌러 준비한 재료를 체크하세요.
                </p>
                <span className="text-sm font-semibold text-amber-700 bg-amber-100 rounded-full px-3 py-1">
                  {checkedCount} / {INGREDIENTS.length}
                </span>
              </div>
              <ul className="divide-y divide-amber-50 sm:grid sm:grid-cols-2 sm:gap-x-6 sm:divide-y-0">
                {INGREDIENTS.map((item) => (
                  <CheckItem
                    key={item.id}
                    checked={!!checked[item.id]}
                    onToggle={() => toggleIngredient(item.id)}
                    label={item.label}
                    amount={item.amount}
                  />
                ))}
              </ul>
            </Card>

            {/* 조리 순서 섹션 */}
            <Card title="조리 순서" icon="👩‍🍳">
              <p className="text-sm text-amber-600 mb-3">
                완료한 단계를 누르면 체크 표시됩니다.
              </p>
              <ol className="space-y-1">
                {STEPS.map((text, idx) => (
                  <StepItem
                    key={idx}
                    number={idx + 1}
                    text={text}
                    done={!!doneSteps[idx]}
                    onToggle={() => toggleStep(idx)}
                  />
                ))}
              </ol>
            </Card>

            {/* 팁 섹션 */}
            <Card title="맛있게 만드는 팁" icon="💡" className="bg-amber-100/60 border-amber-200">
              <ul className="space-y-3">
                {TIPS.map((tip, idx) => (
                  <li key={idx} className="flex items-start gap-3">
                    <span className="flex-shrink-0 mt-0.5 text-amber-500" aria-hidden="true">★</span>
                    <p className="text-amber-900 leading-relaxed">{tip}</p>
                  </li>
                ))}
              </ul>
            </Card>

            {/* 푸터 */}
            <footer className="text-center text-amber-500 text-sm pt-4">
              <p>맛있게 드세요! 🥢</p>
            </footer>
          </main>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      return <RecipePage />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
