<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USD ↔ KRW 환율 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-slate-100 to-slate-200 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo, useEffect, useCallback } = React;

    const EXCHANGE_API_URL = "https://open.er-api.com/v6/latest/USD";

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, value, onChange, placeholder, prefix, disabled }) {
      return (
        <div className="w-full">
          {label && (
            <label className="block text-sm font-medium text-slate-600 mb-2">
              {label}
            </label>
          )}
          <div className="relative">
            {prefix && (
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg font-semibold">
                {prefix}
              </span>
            )}
            <input
              type="number"
              inputMode="decimal"
              min="0"
              value={value}
              onChange={onChange}
              placeholder={placeholder}
              disabled={disabled}
              className={`w-full ${prefix ? "pl-9" : "pl-4"} pr-4 py-3 text-lg rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition disabled:bg-slate-100 disabled:cursor-not-allowed`}
              aria-label={label}
            />
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Converter Page Component
    // ========================================

    function Converter() {
      const [usd, setUsd] = useState("");
      const [krw, setKrw] = useState("");
      const [activeField, setActiveField] = useState("usd"); // 'usd' | 'krw'
      const [rate, setRate] = useState(null);
      const [lastUpdated, setLastUpdated] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);

      const fetchRate = useCallback(async () => {
        setLoading(true);
        setError(null);
        try {
          const res = await fetch(EXCHANGE_API_URL);
          if (!res.ok) throw new Error("네트워크 응답이 올바르지 않습니다.");
          const data = await res.json();
          const krwRate = data?.rates?.KRW;
          if (typeof krwRate !== "number") {
            throw new Error("환율 정보를 찾을 수 없습니다.");
          }
          setRate(krwRate);
          setLastUpdated(data?.time_last_update_utc ?? null);
        } catch (e) {
          setError(e.message || "환율을 불러오지 못했습니다.");
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        fetchRate();
      }, [fetchRate]);

      // 환율이 바뀌면 마지막으로 편집한 필드 기준으로 반대편 값을 다시 계산
      useEffect(() => {
        if (rate == null) return;
        if (activeField === "usd") {
          const amount = parseFloat(usd);
          setKrw(usd === "" || isNaN(amount) || amount < 0 ? "" : (amount * rate).toFixed(0));
        } else {
          const amount = parseFloat(krw);
          setUsd(krw === "" || isNaN(amount) || amount < 0 ? "" : (amount / rate).toFixed(2));
        }
        // rate 변경 시에만 재계산 (순환 업데이트 방지를 위해 입력값은 의존성에서 제외)
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [rate]);

      // USD 입력 → KRW 계산
      const handleUsdChange = (e) => {
        const val = e.target.value;
        setActiveField("usd");
        setUsd(val);
        if (rate == null) return;
        const amount = parseFloat(val);
        setKrw(val === "" || isNaN(amount) || amount < 0 ? "" : (amount * rate).toFixed(0));
      };

      // KRW 입력 → USD 계산
      const handleKrwChange = (e) => {
        const val = e.target.value;
        setActiveField("krw");
        setKrw(val);
        if (rate == null) return;
        const amount = parseFloat(val);
        setUsd(val === "" || isNaN(amount) || amount < 0 ? "" : (amount / rate).toFixed(2));
      };

      // 두 필드의 값을 서로 맞바꾸기
      const handleSwap = () => {
        setUsd(krw);
        setKrw(usd);
        setActiveField((prev) => (prev === "usd" ? "krw" : "usd"));
      };

      const formattedRate = useMemo(
        () =>
          rate != null
            ? rate.toLocaleString("ko-KR", { maximumFractionDigits: 2 })
            : "—",
        [rate]
      );

      const formattedUpdatedTime = useMemo(() => {
        if (!lastUpdated) return null;
        const d = new Date(lastUpdated);
        if (isNaN(d.getTime())) return null;
        return d.toLocaleString("ko-KR", {
          timeZone: "Asia/Seoul",
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        });
      }, [lastUpdated]);

      const disabled = loading || !!error;

      return (
        <div className="max-w-md w-full mx-auto">
          <div className="text-center mb-6">
            <h1 className="text-2xl sm:text-3xl font-bold text-slate-800">
              USD ↔ KRW 환율 계산기
            </h1>
            <p className="text-slate-500 mt-1 text-sm">
              달러 또는 원화를 입력하면 자동으로 변환됩니다
            </p>
          </div>

          <Card>
            <div className="flex flex-col items-center justify-center gap-2 mb-6">
              {loading ? (
                <span className="inline-flex items-center gap-2 px-3 py-1 rounded-full bg-slate-100 text-slate-600 text-sm font-medium">
                  <span className="w-3 h-3 border-2 border-slate-400 border-t-transparent rounded-full animate-spin"></span>
                  환율 불러오는 중...
                </span>
              ) : error ? (
                <div className="flex flex-col items-center gap-2">
                  <span className="inline-flex items-center px-3 py-1 rounded-full bg-red-50 text-red-600 text-sm font-medium">
                    {error}
                  </span>
                  <button
                    onClick={fetchRate}
                    className="px-4 py-1.5 rounded-lg bg-red-500 hover:bg-red-600 text-white text-sm font-medium transition"
                  >
                    다시 시도
                  </button>
                </div>
              ) : (
                <>
                  <span className="inline-flex items-center px-3 py-1 rounded-full bg-blue-50 text-blue-700 text-sm font-medium">
                    실시간 환율 (네이버 기준): 1 USD = {formattedRate} KRW
                  </span>
                  {formattedUpdatedTime && (
                    <span className="text-xs text-slate-400">
                      마지막 업데이트: {formattedUpdatedTime} (한국시간)
                    </span>
                  )}
                </>
              )}
            </div>

            <Input
              label="미국 달러 (USD)"
              value={usd}
              onChange={handleUsdChange}
              placeholder="0"
              prefix="$"
              disabled={disabled}
            />

            <div className="flex justify-center my-5">
              <button
                onClick={handleSwap}
                disabled={disabled}
                aria-label="USD와 KRW 값 바꾸기"
                title="값 바꾸기"
                className="w-10 h-10 rounded-full bg-slate-100 hover:bg-blue-100 active:scale-95 flex items-center justify-center text-slate-500 hover:text-blue-600 text-xl transition disabled:opacity-50 disabled:cursor-not-allowed"
              >
                ↕
              </button>
            </div>

            <Input
              label="한국 원화 (KRW)"
              value={krw}
              onChange={handleKrwChange}
              placeholder="0"
              prefix="₩"
              disabled={disabled}
            />
          </Card>

          <p className="text-center text-xs text-slate-400 mt-4">
            * 환율은 open.er-api.com에서 실시간으로 제공되며, 실제 거래 시세와 다소 차이가 있을 수 있습니다.
          </p>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return (
        <div className="min-h-screen flex items-center justify-center p-4">
          <Converter />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
