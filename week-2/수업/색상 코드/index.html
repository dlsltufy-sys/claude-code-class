          { name: '어두운슬레이트', hex: '#1E293B' },

        ],

    function getContrastText(hex) {
      const c = hex.replace('#', '');
      const r = parseInt(c.substring(0, 2), 16);
      const g = parseInt(c.substring(2, 4), 16);
      const b = parseInt(c.substring(4, 6), 16);
      const luminance = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      return luminance > 0.6 ? '#111827' : '#FFFFFF';
    }

    function ColorSwatch({ color, selected, onClick }) {
      const isLight = getContrastText(color.hex) === '#111827';
      return (
        <button
          type="button"
          onClick={() => onClick(color)}
          aria-label={`${color.name} 색상 선택`}
          aria-pressed={selected}
          className={`group relative aspect-square rounded-xl transition-all duration-200 focus:outline-none focus:ring-4 focus:ring-blue-400/50 hover:-translate-y-1 hover:shadow-lg ${
            selected ? 'ring-4 ring-blue-500 scale-105 shadow-lg' : 'ring-1 ring-black/10'
          } ${isLight ? 'border border-slate-200' : ''}`}
          style={{ backgroundColor: color.hex }}
        >
          <span
            className="absolute inset-x-0 bottom-0 rounded-b-xl px-1 py-1 text-[11px] font-medium opacity-0 transition-opacity group-hover:opacity-100"
            style={{
              color: getContrastText(color.hex),
              backgroundColor: isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.12)',
            }}
          >
            {color.name}
          </span>
        </button>
      );
    }

    function RelatedColorCard({ color, onCopy, copiedHex }) {
      const isLight = getContrastText(color.hex) === '#111827';
      const isCopied = copiedHex === color.hex;
      return (
        <button
          type="button"
          onClick={() => onCopy(color.hex)}
          title={`${color.name} 복사`}
          className={`group flex items-center gap-3 rounded-xl border p-3 text-left transition-all hover:shadow-md focus:outline-none focus:ring-2 focus:ring-blue-400 ${
            isCopied ? 'border-green-400 bg-green-50' : 'border-slate-200 bg-white hover:border-slate-300'
          }`}
        >
          <div
            className={`h-10 w-10 flex-shrink-0 rounded-lg shadow-sm ${isLight ? 'border border-slate-200' : ''}`}
            style={{ backgroundColor: color.hex }}
          />
          <div className="min-w-0 flex-1">
            <p className="truncate text-sm font-medium text-slate-700">{color.name}</p>
            <p className="font-mono text-xs text-slate-500">{color.hex.toUpperCase()}</p>
          </div>
          <span className={`text-xs font-medium ${isCopied ? 'text-green-600' : 'text-slate-400 opacity-0 group-hover:opacity-100'}`}>
            {isCopied ? '✓ 복사됨' : '복사'}
          </span>
        </button>
      );
    }

    function PreviewPanel({ color, onCopy, copiedHex }) {
      if (!color) {
        return (
          <div className="flex h-full min-h-[320px] flex-col items-center justify-center rounded-2xl border-2 border-dashed border-slate-200 bg-white p-8 text-center">
            <div className="mb-3 text-4xl">🎨</div>
            <p className="text-slate-500">색상을 선택하면<br />연관 색상이 표시됩니다.</p>
          </div>
        );
      }

      const textColor = getContrastText(color.hex);

      return (
        <div className="animate-fade-in space-y-4">
          {/* 선택된 색상 메인 카드 */}
          <div className="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
            <div
              className="flex h-40 items-end justify-between p-5"
              style={{ backgroundColor: color.hex }}
            >
              <span className="text-xl font-bold" style={{ color: textColor }}>{color.name}</span>
              <button
                type="button"
                onClick={() => onCopy(color.hex)}
                className="rounded-full px-3 py-1 text-xs font-semibold transition-opacity hover:opacity-80 focus:outline-none"
                style={{
                  color: textColor,
                  backgroundColor: textColor === '#111827' ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.2)',
                }}
              >
                {copiedHex === color.hex ? '✓ 복사됨!' : color.hex.toUpperCase()}
              </button>
            </div>
          </div>

          {/* 연관 색상 목록 */}
          <div>
            <p className="mb-2 text-xs font-semibold uppercase tracking-wide text-slate-400">연관 색상</p>
            <div className="space-y-2">
              {color.related.map((rel) => (
                <RelatedColorCard
                  key={rel.hex}
                  color={rel}
                  onCopy={onCopy}
                  copiedHex={copiedHex}
                />
              ))}
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [selected, setSelected] = useState(null);
      const [copiedHex, setCopiedHex] = useState(null);

      const handleSelect = useCallback((color) => {
        setSelected(color);
        setCopiedHex(null);
      }, []);

      const handleCopy = useCallback(async (hex) => {
        const text = hex.toUpperCase();
        try {
          if (navigator.clipboard && navigator.clipboard.writeText) {
            await navigator.clipboard.writeText(text);
          } else {
            const ta = document.createElement('textarea');
            ta.value = text;
            ta.style.position = 'fixed';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
          }
          setCopiedHex(hex);
          setTimeout(() => setCopiedHex(null), 1500);
        } catch (e) {
          console.error('복사 실패', e);
        }
      }, []);

      return (
        <div className="mx-auto max-w-5xl px-4 py-8 sm:py-12">
          <header className="mb-8 text-center">
            <h1 className="text-3xl font-bold text-slate-800 sm:text-4xl">색상 팔레트</h1>
            <p className="mt-2 text-slate-500">색상을 클릭하면 연관 색상의 HEX 코드를 확인할 수 있습니다.</p>
          </header>

          <div className="grid grid-cols-1 gap-6 lg:grid-cols-3">
            <div className="lg:col-span-2">
              <div className="grid grid-cols-4 gap-3 sm:grid-cols-5 md:grid-cols-6">
                {COLORS.map((color) => (
                  <ColorSwatch
                    key={color.hex + color.name}
                    color={color}
                    selected={selected && selected.hex === color.hex}
                    onClick={handleSelect}
                  />
                ))}
              </div>
            </div>

            <aside className="lg:sticky lg:top-8 lg:self-start">
              <PreviewPanel color={selected} onCopy={handleCopy} copiedHex={copiedHex} />
            </aside>
          </div>

          <footer className="mt-10 text-center text-xs text-slate-400">
            총 {COLORS.length}가지 색상 · 각 색상마다 5가지 연관 색상
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
