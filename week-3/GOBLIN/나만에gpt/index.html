<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나만의 AI 상담사</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    body { font-family: 'Noto Sans KR', sans-serif; }
    /* 부드러운 스크롤바 */
    #chat::-webkit-scrollbar { width: 8px; }
    #chat::-webkit-scrollbar-thumb { background: #d6c4a8; border-radius: 8px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    /* 로딩 점 애니메이션 */
    .typing span {
      display: inline-block;
      width: 6px; height: 6px;
      margin: 0 1px;
      background: #a1887f;
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out both;
    }
    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
      40% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-b from-[#f7f1e6] to-[#efe4d2] flex items-center justify-center p-4">

  <div class="w-full max-w-2xl h-[90vh] flex flex-col bg-[#fdfaf4] rounded-3xl shadow-xl border border-[#e7d9c2] overflow-hidden">

    <!-- 헤더 -->
    <header class="px-6 py-5 bg-gradient-to-r from-[#8d6e63] to-[#a1887f] text-white flex items-center justify-between">
      <div>
        <h1 class="text-xl font-bold tracking-tight">나만의 AI 상담사 💬</h1>
        <p class="text-sm text-[#f3e9da] mt-0.5">승오님만을 위한 공간입니다</p>
      </div>
      <button id="resetBtn"
        class="text-sm bg-white/15 hover:bg-white/25 transition px-3 py-2 rounded-xl border border-white/20">
        대화 초기화
      </button>
    </header>

    <!-- 채팅 영역 -->
    <main id="chat" class="flex-1 overflow-y-auto px-5 py-6 space-y-4 bg-[#fdfaf4]">
      <!-- 메시지가 동적으로 추가됩니다 -->
    </main>

    <!-- 입력 영역 -->
    <footer class="px-4 py-4 border-t border-[#ece0cd] bg-[#f9f3e8]">
      <div class="flex items-end gap-2">
        <textarea id="messageInput" rows="1" placeholder="편하게 이야기를 들려주세요..."
          class="flex-1 resize-none max-h-32 px-4 py-3 rounded-2xl border border-[#dcc9ac] bg-white
                 text-[#4e3b2c] placeholder-[#b0a18d] focus:outline-none focus:ring-2 focus:ring-[#c4a87e]"></textarea>
        <button id="sendBtn"
          class="shrink-0 px-5 py-3 rounded-2xl bg-[#8d6e63] hover:bg-[#7a5d52] text-white font-medium
                 transition disabled:opacity-50 disabled:cursor-not-allowed">
          전송
        </button>
      </div>
    </footer>

  </div>

  <script src="client.js"></script>
</body>
</html>
