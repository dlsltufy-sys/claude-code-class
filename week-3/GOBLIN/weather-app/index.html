<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>날씨 앱</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .glass {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.18);
    }
    .glass-light {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.12);
    }
    .glass-active {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.4);
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .animate-fade-up { animation: fadeInUp 0.4s ease forwards; }
    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .animate-float { animation: float 4s ease-in-out infinite; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .animate-spin { animation: spin 1s linear infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // 🌐 API 설정
    // ========================================
    const API_KEY = "1d5926b624ef458b103acdefc47d5cbc";
    const BASE_URL = "https://api.openweathermap.org/data/2.5";

    const CITY_LIST = ["서울", "부산", "제주", "인천", "대구"];
    const CITY_NAME_MAP = {
      "서울": "Seoul", "부산": "Busan", "제주": "Jeju",
      "인천": "Incheon", "대구": "Daegu",
    };

    function getWeatherIcon(id, isNight = false) {
      if (id >= 200 && id < 300) return "⛈️";
      if (id >= 300 && id < 400) return "🌦️";
      if (id >= 500 && id < 600) return id >= 511 ? "🌨️" : "🌧️";
      if (id >= 600 && id < 700) return "❄️";
      if (id >= 700 && id < 800) return "🌫️";
      if (id === 800) return isNight ? "🌙" : "☀️";
      if (id === 801) return "🌤️";
      if (id === 802) return "⛅";
      if (id >= 803) return "☁️";
      return "🌡️";
    }

    function getGradient(id) {
      if (id >= 200 && id < 300) return "from-slate-600 via-slate-700 to-gray-800";
      if (id >= 300 && id < 600) return "from-slate-500 via-slate-600 to-gray-700";
      if (id >= 600 && id < 700) return "from-blue-200 via-blue-300 to-indigo-400";
      if (id >= 700 && id < 800) return "from-slate-400 via-slate-500 to-slate-600";
      if (id === 800) return "from-sky-400 via-blue-500 to-indigo-600";
      if (id <= 802) return "from-sky-300 via-blue-400 to-blue-500";
      return "from-slate-400 via-slate-500 to-slate-600";
    }

    function getDayLabel(dateStr) {
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      const date = new Date(dateStr);
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);
      if (date.toDateString() === today.toDateString()) return "오늘";
      if (date.toDateString() === tomorrow.toDateString()) return "내일";
      return `${date.getMonth() + 1}/${date.getDate()}(${days[date.getDay()]})`;
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const days = ["일요일", "월요일", "화요일", "수요일", "목요일", "금요일", "토요일"];
      const today = new Date();
      const tomorrow = new Date(today);
      tomorrow.setDate(today.getDate() + 1);
      if (date.toDateString() === today.toDateString()) return `오늘 · ${date.getMonth() + 1}월 ${date.getDate()}일`;
      if (date.toDateString() === tomorrow.toDateString()) return `내일 · ${date.getMonth() + 1}월 ${date.getDate()}일`;
      return `${days[date.getDay()]} · ${date.getMonth() + 1}월 ${date.getDate()}일`;
    }

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ children, className = "" }) {
      return <div className={`glass rounded-3xl shadow-2xl ${className}`}>{children}</div>;
    }

    function Button({ children, onClick, variant = "primary", className = "", type = "button" }) {
      const variants = {
        primary: "bg-white/90 text-slate-800 hover:bg-white",
        ghost: "bg-white/10 text-white hover:bg-white/20 border border-white/20",
      };
      return (
        <button type={type} onClick={onClick}
          className={`px-5 py-3 rounded-2xl font-semibold transition-all active:scale-95 ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    function SearchInput({ value, onChange, onSubmit }) {
      return (
        <form onSubmit={(e) => { e.preventDefault(); onSubmit(); }} className="flex gap-2 w-full">
          <div className="relative flex-1">
            <span className="absolute left-4 top-1/2 -translate-y-1/2 text-white/70 text-lg">🔍</span>
            <input type="text" value={value} onChange={(e) => onChange(e.target.value)}
              placeholder="도시 이름을 입력하세요" aria-label="도시 검색"
              className="w-full glass-light rounded-2xl pl-11 pr-4 py-3 text-white placeholder-white/50 outline-none focus:ring-2 focus:ring-white/40 transition" />
          </div>
          <Button type="submit">검색</Button>
        </form>
      );
    }

    function DetailTile({ icon, label, value, unit }) {
      return (
        <div className="glass-light rounded-2xl p-4 flex flex-col items-center justify-center text-center">
          <span className="text-2xl mb-1">{icon}</span>
          <span className="text-white/60 text-xs sm:text-sm">{label}</span>
          <span className="text-white font-bold text-lg sm:text-xl mt-0.5">
            {value}<span className="text-sm font-medium text-white/70">{unit}</span>
          </span>
        </div>
      );
    }

    function Spinner() {
      return (
        <div className="flex flex-col items-center justify-center py-20 text-white">
          <div className="w-12 h-12 rounded-full border-4 border-white/30 border-t-white animate-spin mb-4"></div>
          <p className="text-white/70">날씨 데이터 불러오는 중...</p>
        </div>
      );
    }

    // ========================================
    // 🧩 날씨 카드 컴포넌트
    // ========================================
    function CurrentWeather({ data }) {
      return (
        <Card className="p-6 sm:p-8 text-white">
          <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
            <div>
              <h2 className="text-2xl font-bold flex items-center gap-2">
                <span>📍</span>{data.city}
              </h2>
              <p className="text-white/70 mt-1 capitalize">{data.condition}</p>
              <div className="flex items-start mt-4">
                <span className="text-6xl sm:text-7xl font-extralight">{Math.round(data.temp)}</span>
                <span className="text-3xl font-light mt-2">°C</span>
              </div>
            </div>
            <div className="text-7xl sm:text-8xl self-center animate-float">{data.icon}</div>
          </div>
        </Card>
      );
    }

    function TodayDetails({ details }) {
      return (
        <Card className="p-6 text-white">
          <h3 className="text-lg font-bold mb-4">현재 상세 정보</h3>
          <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
            <DetailTile icon="🌡️" label="체감온도" value={Math.round(details.feelsLike)} unit="°C" />
            <DetailTile icon="💧" label="습도" value={details.humidity} unit="%" />
            <DetailTile icon="💨" label="풍속" value={details.wind.toFixed(1)} unit="m/s" />
            <DetailTile icon="👁️" label="가시거리" value={(details.visibility / 1000).toFixed(1)} unit="km" />
          </div>
        </Card>
      );
    }

    // ========================================
    // 📅 날짜별/시간별 예보 컴포넌트
    // ========================================
    function HourlyRow({ item }) {
      return (
        <div className="glass-light rounded-2xl px-4 py-3 flex items-center gap-4 hover:bg-white/15 transition">
          <span className="text-white/70 text-sm w-14 shrink-0">{item.time}</span>
          <span className="text-2xl">{item.icon}</span>
          <span className="text-white text-sm flex-1">{item.condition}</span>
          <span className="text-white font-bold text-lg">{Math.round(item.temp)}°</span>
          <div className="hidden sm:flex items-center gap-3 text-sm text-white/60 shrink-0">
            <span>💧{item.humidity}%</span>
            <span>💨{item.wind.toFixed(1)}m/s</span>
          </div>
        </div>
      );
    }

    function DailyForecast({ dailyData, selectedDate, onSelectDate }) {
      return (
        <Card className="p-6 text-white">
          {/* 날짜 탭 */}
          <h3 className="text-lg font-bold mb-4">날짜별 예보</h3>
          <div className="flex gap-2 overflow-x-auto no-scrollbar pb-3">
            {dailyData.map((day) => (
              <button
                key={day.date}
                onClick={() => onSelectDate(day.date)}
                className={`flex flex-col items-center rounded-2xl px-4 py-3 min-w-[80px] transition shrink-0 ${
                  selectedDate === day.date ? "glass-active" : "glass-light hover:bg-white/15"
                }`}
              >
                <span className="text-xs text-white/70 mb-1">{getDayLabel(day.date)}</span>
                <span className="text-2xl my-1">{day.icon}</span>
                <span className="text-xs font-bold">{Math.round(day.high)}°</span>
                <span className="text-xs text-white/50">{Math.round(day.low)}°</span>
              </button>
            ))}
          </div>

          {/* 선택된 날짜의 시간별 데이터 */}
          {selectedDate && (() => {
            const day = dailyData.find(d => d.date === selectedDate);
            if (!day) return null;
            return (
              <div className="mt-4 animate-fade-up">
                <div className="flex items-center justify-between mb-3">
                  <h4 className="text-white/90 font-semibold">{formatDate(selectedDate)} 시간별 날씨</h4>
                  <span className="text-white/50 text-xs">{day.hourly.length}개 시간대</span>
                </div>
                <div className="space-y-2 max-h-72 overflow-y-auto no-scrollbar">
                  {day.hourly.map((item, i) => (
                    <HourlyRow key={i} item={item} />
                  ))}
                </div>
                {/* 모바일용 상세 범례 */}
                <p className="sm:hidden text-white/40 text-xs mt-3 text-center">
                  좌→시간 · 아이콘 · 날씨 · 기온 순
                </p>
              </div>
            );
          })()}
        </Card>
      );
    }

    // ========================================
    // 📄 Page Component
    // ========================================
    function WeatherApp() {
      const [query, setQuery] = useState("");
      const [cityName, setCityName] = useState("서울");
      const [weather, setWeather] = useState(null);
      const [dailyData, setDailyData] = useState([]);
      const [selectedDate, setSelectedDate] = useState(null);
      const [gradient, setGradient] = useState("from-sky-400 via-blue-500 to-indigo-600");
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState("");

      const fetchWeather = useCallback(async (name) => {
        setLoading(true);
        setError("");
        const englishName = CITY_NAME_MAP[name] || name;
        try {
          const [currentRes, forecastRes] = await Promise.all([
            fetch(`${BASE_URL}/weather?q=${encodeURIComponent(englishName)}&appid=${API_KEY}&units=metric&lang=kr`),
            fetch(`${BASE_URL}/forecast?q=${encodeURIComponent(englishName)}&appid=${API_KEY}&units=metric&lang=kr`),
          ]);

          if (!currentRes.ok) {
            const err = await currentRes.json();
            throw new Error(err.message || "도시를 찾을 수 없습니다.");
          }

          const current = await currentRes.json();
          const forecastData = await forecastRes.json();

          const weatherId = current.weather[0].id;
          const isNight = current.dt < current.sys.sunrise || current.dt > current.sys.sunset;

          setWeather({
            city: current.name,
            temp: current.main.temp,
            condition: current.weather[0].description,
            icon: getWeatherIcon(weatherId, isNight),
            details: {
              feelsLike: current.main.feels_like,
              humidity: current.main.humidity,
              wind: current.wind.speed,
              visibility: current.visibility,
            },
          });
          setGradient(getGradient(weatherId));

          // 3시간 간격 데이터를 날짜별로 그룹핑
          const grouped = {};
          forecastData.list.forEach((item) => {
            const [date, timeFull] = item.dt_txt.split(" ");
            const hour = timeFull.slice(0, 5); // "HH:MM"
            if (!grouped[date]) grouped[date] = [];
            grouped[date].push({
              time: hour,
              temp: item.main.temp,
              feelsLike: item.main.feels_like,
              humidity: item.main.humidity,
              wind: item.wind.speed,
              condition: item.weather[0].description,
              icon: getWeatherIcon(item.weather[0].id),
              id: item.weather[0].id,
            });
          });

          // 날짜별 대표값(최고/최저/대표 아이콘) 계산
          const processed = Object.entries(grouped).map(([date, hours]) => {
            const temps = hours.map(h => h.temp);
            const midHour = hours[Math.floor(hours.length / 2)];
            return {
              date,
              high: Math.max(...temps),
              low: Math.min(...temps),
              icon: getWeatherIcon(midHour.id),
              condition: midHour.condition,
              hourly: hours,
            };
          });

          setDailyData(processed);
          // 첫 번째 날짜 자동 선택
          if (processed.length > 0) setSelectedDate(processed[0].date);
        } catch (e) {
          setError(e.message || "날씨 정보를 불러오지 못했습니다.");
        } finally {
          setLoading(false);
        }
      }, []);

      useEffect(() => { fetchWeather(cityName); }, [cityName]);

      const handleSearch = () => {
        const trimmed = query.trim();
        if (!trimmed) return;
        setCityName(trimmed);
        setQuery("");
      };

      return (
        <div className={`min-h-screen bg-gradient-to-br ${gradient} transition-colors duration-700`}>
          <div className="max-w-3xl mx-auto px-4 py-8 sm:py-12">

            {/* 헤더 & 검색 */}
            <header className="mb-6">
              <h1 className="text-white text-3xl font-bold mb-4 flex items-center gap-2">
                🌤️ 날씨
              </h1>
              <SearchInput value={query} onChange={setQuery} onSubmit={handleSearch} />
              {error && (
                <p className="text-white bg-red-500/40 glass-light rounded-xl px-4 py-2 mt-3 text-sm" role="alert">
                  ⚠️ {error}
                </p>
              )}
              <div className="flex flex-wrap gap-2 mt-3">
                {CITY_LIST.map((c) => (
                  <button key={c} onClick={() => { setCityName(c); setError(""); }}
                    className={`px-3 py-1.5 rounded-full text-sm transition ${
                      c === cityName ? "bg-white/90 text-slate-800 font-semibold" : "glass-light text-white/80 hover:bg-white/20"
                    }`}>
                    {c}
                  </button>
                ))}
              </div>
            </header>

            {loading ? <Spinner /> : weather ? (
              <div className="space-y-5">
                <div className="animate-fade-up" style={{ animationDelay: "0ms" }}>
                  <CurrentWeather data={weather} />
                </div>
                <div className="animate-fade-up" style={{ animationDelay: "80ms" }}>
                  <TodayDetails details={weather.details} />
                </div>
                {dailyData.length > 0 && (
                  <div className="animate-fade-up" style={{ animationDelay: "160ms" }}>
                    <DailyForecast
                      dailyData={dailyData}
                      selectedDate={selectedDate}
                      onSelectDate={setSelectedDate}
                    />
                  </div>
                )}
              </div>
            ) : null}

            <footer className="text-center text-white/50 text-xs mt-8">
              OpenWeatherMap API 기반 · React + Tailwind
            </footer>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App & Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<WeatherApp />);
  </script>
</body>
</html>
