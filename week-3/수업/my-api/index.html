<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello API</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    @keyframes ping-once {
      0%   { transform: scale(1); opacity: 1; }
      50%  { transform: scale(1.15); opacity: 0.7; }
      100% { transform: scale(1); opacity: 1; }
    }
    .ping-once { animation: ping-once 0.4s ease-out; }
    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fade-up 0.4s ease-out; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white/10 backdrop-blur-md border border-white/20 rounded-3xl p-8 shadow-2xl ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 📄 App Component
    // ========================================

    function App() {
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [animKey, setAnimKey] = useState(0);
      const btnRef = useRef(null);

      async function fetchHello() {
        if (loading) return;
        setLoading(true);
        setError('');

        try {
          const res = await fetch('/api/hello');
          const json = await res.json();
          if (!json.success) throw new Error('서버 오류');
          setResult(json.data);
          setAnimKey(k => k + 1);
        } catch (e) {
          setError('서버에 연결할 수 없어요. 서버가 실행 중인지 확인해 주세요.');
        } finally {
          setLoading(false);
        }
      }

      return (
        <div className="w-full max-w-md">
          <Card>
            {/* Header */}
            <div className="text-center mb-8">
              <div className="text-6xl mb-4">👋</div>
              <h1 className="text-2xl font-bold text-white">Hello API</h1>
              <p className="text-white/60 text-sm mt-1">버튼을 눌러 서버에 인사해 보세요</p>
            </div>

            {/* Button */}
            <button
              ref={btnRef}
              onClick={fetchHello}
              disabled={loading}
              className="w-full py-4 rounded-2xl font-bold text-lg transition-all shadow-lg
                bg-white text-purple-700 hover:bg-purple-50 hover:shadow-xl hover:-translate-y-0.5
                active:translate-y-0 disabled:opacity-60 disabled:cursor-not-allowed"
            >
              {loading ? (
                <span className="flex items-center justify-center gap-2">
                  <svg className="w-5 h-5 animate-spin" fill="none" viewBox="0 0 24 24">
                    <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                    <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z"/>
                  </svg>
                  요청 중...
                </span>
              ) : '🙌 인사하기'}
            </button>

            {/* Error */}
            {error && (
              <div className="mt-4 p-4 rounded-2xl bg-red-400/20 border border-red-300/30 text-red-200 text-sm text-center">
                {error}
              </div>
            )}

            {/* Result */}
            {result && !error && (
              <div key={animKey} className="fade-up mt-6 space-y-3">
                <div className="p-5 rounded-2xl bg-white/10 border border-white/20 text-center">
                  <p className="text-white font-semibold text-lg leading-snug">{result.message}</p>
                </div>
                <div className="grid grid-cols-2 gap-3">
                  <div className="p-4 rounded-2xl bg-white/10 border border-white/20 text-center">
                    <p className="text-white/50 text-xs mb-1">현재 시간</p>
                    <p className="text-white font-bold text-xl">{result.time}</p>
                  </div>
                  <div className="p-4 rounded-2xl bg-white/10 border border-white/20 text-center">
                    <p className="text-white/50 text-xs mb-1">오늘 날짜</p>
                    <p className="text-white font-bold text-sm leading-tight">{result.date}</p>
                  </div>
                </div>
              </div>
            )}
          </Card>

          <p className="text-center text-white/40 text-xs mt-4">
            GET /api/hello · Express.js
          </p>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
