<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마음 상담소</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body { background: linear-gradient(135deg, #f5f0ff 0%, #fdf0f8 50%, #f0faf8 100%); }
    .chat-bubble-counselor { border-radius: 4px 18px 18px 18px; }
    .chat-bubble-user { border-radius: 18px 4px 18px 18px; }
    .scrollbar-hide::-webkit-scrollbar { display: none; }
    .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    @keyframes bounce-dot {
      0%, 80%, 100% { transform: translateY(0); }
      40% { transform: translateY(-6px); }
    }
    .dot { animation: bounce-dot 1.2s infinite ease-in-out; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .msg-enter { animation: fade-in 0.3s ease-out; }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Avatar({ isBot, size = 'sm' }) {
      const sizeMap = { sm: 'w-8 h-8 text-base', md: 'w-12 h-12 text-xl', lg: 'w-20 h-20 text-3xl' };
      return (
        <div className={`${sizeMap[size]} rounded-full flex items-center justify-center shadow-sm flex-shrink-0 ${
          isBot
            ? 'bg-gradient-to-br from-violet-400 to-pink-400 text-white'
            : 'bg-gradient-to-br from-sky-400 to-indigo-400 text-white'
        }`}>
          {isBot ? '🌿' : '😊'}
        </div>
      );
    }

    function EmotionChip({ emoji, label, onClick }) {
      return (
        <button
          onClick={() => onClick(`${emoji} ${label}`)}
          className="flex items-center gap-1 px-3 py-1.5 bg-white border border-violet-200 rounded-full text-sm text-violet-700 hover:bg-violet-50 hover:border-violet-400 transition-all shadow-sm whitespace-nowrap"
        >
          <span>{emoji}</span>
          <span>{label}</span>
        </button>
      );
    }

    function TypingIndicator() {
      return (
        <div className="flex items-end gap-2 msg-enter">
          <Avatar isBot={true} size="sm" />
          <div className="bg-white rounded-2xl px-4 py-3 shadow-sm chat-bubble-counselor flex gap-1.5 items-center">
            <span className="dot w-2 h-2 rounded-full bg-violet-300 inline-block"></span>
            <span className="dot w-2 h-2 rounded-full bg-violet-300 inline-block"></span>
            <span className="dot w-2 h-2 rounded-full bg-violet-300 inline-block"></span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧩 Chat Bubble Component
    // ========================================

    function ChatBubble({ message }) {
      const isUser = message.role === 'user';
      return (
        <div className={`flex items-end gap-2 msg-enter ${isUser ? 'flex-row-reverse' : ''}`}>
          <Avatar isBot={!isUser} size="sm" />
          <div className={`flex flex-col gap-1 max-w-[75%] ${isUser ? 'items-end' : 'items-start'}`}>
            {!isUser && <span className="text-xs text-violet-400 ml-1">마음 상담사 소이</span>}
            <div className={`px-4 py-3 text-sm leading-relaxed shadow-sm ${
              isUser
                ? 'bg-gradient-to-br from-violet-500 to-purple-600 text-white chat-bubble-user'
                : 'bg-white text-gray-700 chat-bubble-counselor'
            }`}>
              {message.text}
            </div>
            <span className={`text-xs text-gray-400 ${isUser ? 'mr-1' : 'ml-1'}`}>{message.time}</span>
          </div>
        </div>
      );
    }

    // ========================================
    // 🧠 GPT API Integration
    // ========================================

    const API_KEY = 'YOUR_OPENAI_API_KEY_HERE';

    const SYSTEM_PROMPT = `당신은 따뜻하고 공감 능력이 뛰어난 심리 상담사 '소이'입니다.

역할:
- 사용자의 감정을 판단하지 않고 진심으로 공감합니다
- 사용자가 스스로 감정을 탐색할 수 있도록 돕는 개방형 질문을 합니다
- 직접적인 조언보다 감정 수용과 경청에 집중합니다
- 위기 상황(자해, 자살 언급)에는 전문 기관 연락처를 안내합니다

말투:
- 따뜻하고 친근한 존댓말 사용
- 짧고 명확한 문장
- 이모지는 최소한으로 사용 (1-2개 이하)
- 한 번에 1-2개의 질문만

주의: 의료 진단이나 처방은 하지 않습니다. 필요 시 전문가 상담을 권유합니다.`;

    async function fetchGPTResponse(messages) {
      const apiKey = API_KEY;
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${apiKey}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: SYSTEM_PROMPT },
            ...messages.map(m => ({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text })),
          ],
          max_tokens: 300,
          temperature: 0.8,
        }),
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || '응답 오류');
      }

      const data = await response.json();
      return data.choices[0].message.content;
    }

    // ========================================
    // 📄 App Component
    // ========================================

    const EMOTIONS = [
      { emoji: '😔', label: '우울해요' },
      { emoji: '😰', label: '불안해요' },
      { emoji: '😤', label: '화가 나요' },
      { emoji: '😴', label: '너무 지쳐요' },
      { emoji: '😶', label: '멍해요' },
      { emoji: '🥺', label: '외로워요' },
    ];

    function now() {
      return new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }

    const WELCOME = {
      role: 'counselor',
      text: '안녕하세요 😊 저는 마음 상담사 소이예요. 오늘 어떤 마음으로 오셨나요? 편하게 이야기해 주세요. 판단 없이 귀 기울여 들을게요.',
      time: now(),
    };

    function App() {
      const [messages, setMessages] = useState([WELCOME]);
      const [input, setInput] = useState('');
      const [isTyping, setIsTyping] = useState(false);
      const [error, setError] = useState('');
      const bottomRef = useRef(null);

      useEffect(() => {
        bottomRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, isTyping]);

      async function sendMessage(text) {
        const trimmed = (text || input).trim();
        if (!trimmed || isTyping) return;

        const userMsg = { role: 'user', text: trimmed, time: now() };
        const nextMessages = [...messages, userMsg];
        setMessages(nextMessages);
        setInput('');
        setIsTyping(true);
        setError('');

        try {
          const replyText = await fetchGPTResponse(
            nextMessages.filter(m => m.role !== 'system')
          );
          setMessages(prev => [...prev, { role: 'counselor', text: replyText, time: now() }]);
        } catch (e) {
          setError(`오류: ${e.message}`);
        } finally {
          setIsTyping(false);
        }
      }

      function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      }

      return (
        <div className="w-full max-w-4xl h-[90vh] flex rounded-3xl overflow-hidden shadow-2xl bg-white/60 backdrop-blur-sm border border-white/80">

          {/* ── Sidebar ── */}
          <aside className="hidden md:flex flex-col w-64 bg-gradient-to-b from-violet-50 to-pink-50 border-r border-violet-100 p-6 flex-shrink-0">
            <div className="flex flex-col items-center text-center mb-6">
              <Avatar isBot={true} size="lg" />
              <h2 className="font-bold text-gray-800 text-lg mt-3">소이 상담사</h2>
              <p className="text-xs text-violet-500 mt-1">GPT-4o-mini 기반</p>
            </div>

            <div className="space-y-3 text-sm text-gray-600">
              <div className="bg-white/70 rounded-2xl p-4 shadow-sm">
                <p className="font-semibold text-violet-700 mb-2">전문 분야</p>
                <ul className="space-y-1 text-xs text-gray-500">
                  <li>🌸 우울 · 불안 상담</li>
                  <li>💬 관계 고민</li>
                  <li>🔥 번아웃 회복</li>
                  <li>🧘 마음 챙김</li>
                </ul>
              </div>
              <div className="bg-white/70 rounded-2xl p-4 shadow-sm">
                <p className="font-semibold text-violet-700 mb-1">상담 원칙</p>
                <p className="text-xs leading-relaxed text-gray-500">판단 없는 경청, 공감 중심 대화로 함께 마음을 치유해요.</p>
              </div>
            </div>

            <div className="mt-auto">
              <p className="text-center text-xs text-gray-400 leading-relaxed">
                전문 의료 서비스를 대체하지 않습니다.
              </p>
            </div>
          </aside>

          {/* ── Chat Area ── */}
          <div className="flex flex-col flex-1 min-w-0">

            {/* Header */}
            <header className="flex items-center px-5 py-4 bg-white/80 border-b border-violet-100 backdrop-blur-sm gap-3">
              <div className="md:hidden"><Avatar isBot={true} size="sm" /></div>
              <div>
                <h1 className="font-bold text-gray-800">마음 상담소</h1>
                <p className="text-xs text-green-500 flex items-center gap-1">
                  <span className="w-1.5 h-1.5 rounded-full bg-green-400 inline-block"></span>
                  소이 상담사 · GPT-4o-mini
                </p>
              </div>
            </header>

            {/* Messages */}
            <div className="flex-1 overflow-y-auto scrollbar-hide px-5 py-6 space-y-5">
              {messages.map((msg, i) => (
                <ChatBubble key={i} message={msg} />
              ))}
              {isTyping && <TypingIndicator />}
              {error && (
                <div className="text-center text-xs text-red-400 bg-red-50 rounded-xl px-4 py-2 mx-auto max-w-sm">
                  {error}
                </div>
              )}
              <div ref={bottomRef} />
            </div>

            {/* Emotion Chips */}
            <div className="px-4 pb-2 flex gap-2 overflow-x-auto scrollbar-hide">
              {EMOTIONS.map(e => (
                <EmotionChip key={e.label} emoji={e.emoji} label={e.label} onClick={sendMessage} />
              ))}
            </div>

            {/* Input */}
            <div className="px-4 pb-4 pt-1">
              <div className="flex items-end gap-2 bg-white border border-violet-200 rounded-2xl px-4 py-3 shadow-sm focus-within:border-violet-400 transition-colors">
                <textarea
                  rows={1}
                  value={input}
                  onChange={e => setInput(e.target.value)}
                  onKeyDown={handleKey}
                  placeholder="오늘 어떤 마음인지 편하게 적어보세요..."
                  className="flex-1 resize-none bg-transparent outline-none text-sm text-gray-700 placeholder-gray-400 max-h-32 leading-relaxed"
                  onInput={e => { e.target.style.height = 'auto'; e.target.style.height = e.target.scrollHeight + 'px'; }}
                  disabled={isTyping}
                />
                <button
                  onClick={() => sendMessage()}
                  disabled={!input.trim() || isTyping}
                  className="w-9 h-9 rounded-xl bg-gradient-to-br from-violet-500 to-purple-600 flex items-center justify-center text-white shadow-sm hover:from-violet-600 hover:to-purple-700 transition-all disabled:opacity-40 disabled:cursor-not-allowed flex-shrink-0"
                  aria-label="전송"
                >
                  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" className="w-4 h-4">
                    <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z" />
                  </svg>
                </button>
              </div>
              <p className="text-center text-xs text-gray-400 mt-2">Enter로 전송 · Shift+Enter로 줄바꿈</p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
