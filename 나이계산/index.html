<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>나이 계산기</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gradient-to-br from-indigo-100 via-purple-50 to-pink-100 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useMemo } = React;

    function Card({ children, className = "" }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Input({ label, type = "text", value, onChange, max, className = "" }) {
      return (
        <div className={className}>
          {label && (
            <label className="block text-sm font-medium text-gray-700 mb-2">
              {label}
            </label>
          )}
          <input
            type={type}
            value={value}
            onChange={onChange}
            max={max}
            className="w-full px-4 py-3 rounded-xl border border-gray-300 text-gray-800
                       focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent
                       transition"
          />
        </div>
      );
    }

    function StatCard({ icon, label, value, unit, accent, badge }) {
      return (
        <div className={`rounded-xl p-5 border ${accent.border} ${accent.bg} flex flex-col`}>
          <div className="flex items-center gap-2 mb-2">
            <span className="text-xl" aria-hidden="true">{icon}</span>
            <span className="text-sm font-medium text-gray-600">{label}</span>
            {badge && <span className="ml-auto text-xs px-2 py-0.5 rounded-full bg-indigo-600 text-white font-medium">{badge}</span>}
          </div>
          <div className="mt-auto">
            <span className={`text-3xl font-bold ${accent.text}`}>
              {value.toLocaleString("ko-KR")}
            </span>
            <span className="ml-1 text-gray-500 text-sm">{unit}</span>
          </div>
        </div>
      );
    }

    function calculateAges(birthValue) {
      const birth = new Date(birthValue + "T00:00:00");
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      if (isNaN(birth.getTime()) || birth > today) return null;

      let intlAge = today.getFullYear() - birth.getFullYear();
      const hadBirthdayThisYear =
        today.getMonth() > birth.getMonth() ||
        (today.getMonth() === birth.getMonth() && today.getDate() >= birth.getDate());
      if (!hadBirthdayThisYear) intlAge -= 1;

      const koreanAge = today.getFullYear() - birth.getFullYear() + 1;
      const yearAge = today.getFullYear() - birth.getFullYear();

      const msPerDay = 1000 * 60 * 60 * 24;
      const daysLived = Math.floor((today - birth) / msPerDay) + 1;

      let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday < today) {
        nextBirthday = new Date(today.getFullYear() + 1, birth.getMonth(), birth.getDate());
      }
      const daysUntilBirthday = Math.round((nextBirthday - today) / msPerDay);
      const isBirthdayToday = daysUntilBirthday === 0;

      return { intlAge, koreanAge, yearAge, daysLived, daysUntilBirthday, isBirthdayToday };
    }

    function AgeCalculator() {
      const [birth, setBirth] = useState("");

      const todayStr = useMemo(() => {
        const d = new Date();
        const mm = String(d.getMonth() + 1).padStart(2, "0");
        const dd = String(d.getDate()).padStart(2, "0");
        return `${d.getFullYear()}-${mm}-${dd}`;
      }, []);

      const result = useMemo(() => (birth ? calculateAges(birth) : null), [birth]);
      const invalid = birth && !result;

      return (
        <div className="max-w-2xl mx-auto px-4 py-10 sm:py-16">
          <header className="text-center mb-8">
            <h1 className="text-3xl sm:text-4xl font-bold text-gray-800">🎂 나이 계산기</h1>
            <p className="mt-2 text-gray-500">생년월일을 입력하면 실시간으로 나이를 계산해 드려요.</p>
          </header>

          <Card>
            <Input label="생년월일" type="date" value={birth} onChange={(e) => setBirth(e.target.value)} max={todayStr} />

            {invalid && (
              <p className="mt-4 text-sm text-red-500" role="alert">
                올바른 생년월일을 입력해 주세요. (미래 날짜는 선택할 수 없어요.)
              </p>
            )}

            {result && (
              <div className="mt-6">
                {result.isBirthdayToday && (
                  <div className="mb-5 rounded-xl bg-gradient-to-r from-pink-500 to-purple-500 text-white text-center py-3 font-semibold shadow-md">
                    🎉 오늘은 생일이에요! 축하합니다!
                  </div>
                )}

                <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                  <StatCard icon="📋" label="세는 나이 (한국 전통)" value={result.koreanAge} unit="세"
                    accent={{ bg: "bg-purple-50", border: "border-purple-100", text: "text-purple-600" }} />
                  <StatCard icon="📆" label="연 나이 (행정·군사)" value={result.yearAge} unit="세"
                    accent={{ bg: "bg-sky-50", border: "border-sky-100", text: "text-sky-600" }} />
                  <StatCard icon="✅" label="만 나이 (2023 법정 표준)" value={result.intlAge} unit="세"
                    badge="공식"
                    accent={{ bg: "bg-indigo-50", border: "border-indigo-200", text: "text-indigo-600" }} />
                </div>

                <div className="mt-4 rounded-xl border border-indigo-100 bg-indigo-50 px-4 py-3 text-sm text-indigo-700">
                  💡 <strong>만 나이 통일법</strong> — 2023년 6월 28일부터 모든 법령·공문서에서 <strong>만 나이</strong>가 공식 기준으로 사용됩니다.
                </div>

                <div className="mt-4 grid grid-cols-1 sm:grid-cols-2 gap-4">
                  <StatCard icon="📅" label="태어난 지" value={result.daysLived} unit="일째"
                    accent={{ bg: "bg-pink-50", border: "border-pink-100", text: "text-pink-600" }} />
                  <StatCard icon="⏳" label="다음 생일까지" value={result.daysUntilBirthday} unit="일 남음"
                    accent={{ bg: "bg-emerald-50", border: "border-emerald-100", text: "text-emerald-600" }} />
                </div>
              </div>
            )}

            {!birth && (
              <p className="mt-6 text-center text-gray-400 text-sm">위에서 생년월일을 선택해 주세요.</p>
            )}
          </Card>

          <footer className="mt-8 text-center text-xs text-gray-400">
            세는 나이: 올해 − 출생연도 + 1 &nbsp;·&nbsp; 연 나이: 올해 − 출생연도 &nbsp;·&nbsp; 만 나이: 마지막 생일 기준
          </footer>
        </div>
      );
    }

    function App() {
      return <AgeCalculator />;
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
